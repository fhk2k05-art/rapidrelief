<!DOCTYPE html>
<html>
<head>
<title>RapidRelief Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

/* 🌌 BASE BACKGROUND */
body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  color:white;

  background:linear-gradient(#020617,#020617);
  transition: background 0.6s ease;
}

/* 🔥 NAVBAR */
.navbar {
  position:relative;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px 0;

  background:rgba(255,255,255,0.03);
  backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,0.08);
}

/* LOGO */
.logo {
  height:140px;
}

/* LOGOUT ICON */
.logout-icon {
  position:absolute;
  right:25px;
  top:25px;
  width:30px;
  height:30px;
  cursor:pointer;
  opacity:0.8;
  transition:0.25s;
  filter:invert(1);
}

.logout-icon:hover {
  transform:scale(1.15);
  opacity:1;
}

/* SECTION */
.section-title {
  padding:30px;
  opacity:0.8;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px;
  padding:0 30px;
}

/* CARD */
.card {
  background:rgba(255,255,255,0.05);
  padding:25px;
  border-radius:18px;
  text-align:center;
  border:1px solid rgba(255,255,255,0.08);
  transition:0.25s;
  backdrop-filter:blur(10px);
}

.card:hover {
  transform:translateY(-6px);
  background:rgba(255,255,255,0.1);
}

.card.active {
  background:linear-gradient(135deg,#0ea5e9,#2563eb);
}

/* ICON */
.card-icon {
  width:60px;
  height:60px;
  margin-bottom:10px;
  object-fit:contain;
  filter:invert(1);
}

/* BUTTONS */
.btn-group {
  padding:20px 30px;
}

button {
  width:100%;
  padding:15px;
  margin:8px 0;
  border:none;
  border-radius:15px;
  color:white;
  cursor:pointer;
}

.sos { background:#dc2626; }
.track { background:#1e293b; }
.call { background:#ea580c; }
.navbtn { background:#16a34a; }

/* MAP */
#map {
  height:300px;
  margin:20px 30px;
  border-radius:18px;
}

/* NEARBY */
.nearby {
  padding:20px 30px;
}

.nearby button {
  width:auto;
  padding:10px;
  margin:5px;
  border-radius:10px;
  background:#1e293b;
}

</style>
</head>

<body>

<nav class="navbar">
  <img src="logo.png" class="logo">
  <img src="logout.png" class="logout-icon" onclick="logout()">
</nav>

<div class="section-title">
  <h3>Select Emergency</h3>
</div>

<div class="grid">
  <div class="card" onclick="selectType(this,'Medical')">
    <img src="medical.png" class="card-icon">
    <p>Medical</p>
  </div>

  <div class="card" onclick="selectType(this,'Fire')">
    <img src="fire.png" class="card-icon">
    <p>Fire</p>
  </div>

  <div class="card" onclick="selectType(this,'Crime')">
    <img src="crime.png" class="card-icon">
    <p>Crime</p>
  </div>

  <div class="card" onclick="selectType(this,'Mechanical')">
    <img src="mechanical.png" class="card-icon">
    <p>Mechanical</p>
  </div>
</div>

<div class="btn-group">
  <button class="sos" onclick="sendSOS()">🚨 SEND SOS</button>
  <button class="track" onclick="startTracking()">📍 Start Tracking</button>
  <button class="call" onclick="callEmergency()">📞 Call Emergency</button>
  <button class="navbtn" onclick="navigateHelp()">🧭 Navigate Help</button>
</div>

<div id="map"></div>

<div class="nearby">
  <h3>📍 Nearby Help</h3>
  <button onclick="findPlace('hospital')">🚑 Hospital</button>
  <button onclick="findPlace('police')">🚓 Police</button>
  <button onclick="findPlace('fire_station')">🔥 Fire</button>
  <div id="result"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

let selectedType="Medical";
let map;
let userLat,userLon;
let currentMarker;

/* MAP */
navigator.geolocation.getCurrentPosition(pos=>{
  userLat=pos.coords.latitude;
  userLon=pos.coords.longitude;

  map=L.map('map').setView([userLat,userLon],14);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  L.marker([userLat,userLon]).addTo(map)
    .bindPopup("You are here").openPopup();
});

/* 🎨 CATEGORY BACKGROUND (AESTHETIC) */
function selectType(el,type){
  document.querySelectorAll(".card").forEach(c=>c.classList.remove("active"));
  el.classList.add("active");

  selectedType=type;

  const bg={
    Medical:"https://images.unsplash.com/photo-1576765607924-3c5b1e9a5c3d",
    Fire:"https://images.unsplash.com/photo-1501706362039-c6b2a5f74b16",
    Crime:"https://images.unsplash.com/photo-1540575467063-178a50c2df87",
    Mechanical:"https://images.unsplash.com/photo-1503376780353-7e6692767b70"
  };

  document.body.style.background =
    `linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)), url('${bg[type]}') center/cover fixed`;
}

/* REST SAME */
function sendSOS(){
  fetch("/sos",{method:"POST",headers:{"Content-Type":"application/json"},
  body:JSON.stringify({lat:userLat,lon:userLon,type:selectedType})});
  alert("🚨 SOS SENT");
}

function startTracking(){
  setInterval(()=>{
    navigator.geolocation.getCurrentPosition(pos=>{
      fetch("/track",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({lat:pos.coords.latitude,lon:pos.coords.longitude,time:new Date().toLocaleString()})});
    });
  },5000);
}

function callEmergency(){ window.location.href="tel:112"; }

function navigateHelp(){
  window.open(`https://www.google.com/maps/dir/?api=1&destination=${userLat},${userLon}`);
}

function logout(){ window.location.href="/logout"; }

</script>

</body>
</html>
