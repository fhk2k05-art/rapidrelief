<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<script src="/socket.io/socket.io.js"></script>

<style>

body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#0f172a;
  color:white;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  background:#020617;
  height:100vh;
  padding:20px;
}

.sidebar h2{
  margin-bottom:30px;
}

.sidebar button{
  width:100%;
  margin:10px 0;
  padding:10px;
  background:#1e293b;
  border:none;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

/* MAIN */
.main{
  flex:1;
  padding:20px;
}

/* CARDS */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:15px;
  box-shadow:0 0 10px rgba(0,0,0,0.5);
}

/* SOS FEED */
.feed{
  margin-top:20px;
}

.feed div{
  background:#111827;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
  border-left:4px solid red;
}

</style>
</head>

<body>

<div class="sidebar">
  <h2>🚑 Admin</h2>

  <button onclick="loadData()">Dashboard</button>
  <button onclick="logout()">Logout</button>
</div>

<div class="main">

<h1>📊 Control Panel</h1>

<div class="grid">
  <div class="card">👤 Users: <span id="users">0</span></div>
  <div class="card">🚨 SOS: <span id="sos">0</span></div>
  <div class="card">📍 Active: <span id="active">0</span></div>
</div>

<div class="feed" id="feed"></div>

</div>

<script>

const socket = io();

/* LOAD DATA */
function loadData(){
  fetch("/admin/data")
  .then(res=>res.json())
  .then(data=>{
    document.getElementById("users").innerText=data.users.length;
    document.getElementById("sos").innerText=data.sos.length;
  });
}

/* REALTIME SOS */
socket.on("sos",data=>{
  const div=document.createElement("div");
  div.innerHTML=`
    <b>${data.user}</b><br>
    ${data.lat}, ${data.lon}
  `;
  document.getElementById("feed").prepend(div);
});

/* LOGOUT */
function logout(){
  window.location="/logout";
}

loadData();

</script>

</body>
</html>
