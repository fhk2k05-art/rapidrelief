<!DOCTYPE html>
<html>
<head>
<title>RapidRelief Dashboard PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body {
  margin:0;
  font-family:'Segoe UI',sans-serif;
  color:white;

  background:
  linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
  url("https://images.unsplash.com/photo-1504215680853-026ed2a45def");

  background-size:cover;
}

/* NAV */
nav {
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:rgba(0,0,0,0.6);
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:20px;
}

.card {
  background:#222;
  padding:20px;
  text-align:center;
  cursor:pointer;
  border-radius:10px;
}

.card.active {
  background:#00c6ff;
}

/* BUTTONS */
.sos {
  margin:20px;
  padding:15px;
  width:90%;
  background:red;
  border:none;
  border-radius:20px;
  font-size:18px;
}

.track {
  margin:10px;
  padding:10px;
  background:#00c6ff;
  border:none;
  border-radius:10px;
}

.call {
  margin:10px;
  padding:10px;
  background:orange;
  border:none;
  border-radius:10px;
}

.navbtn {
  margin:10px;
  padding:10px;
  background:#22c55e;
  border:none;
  border-radius:10px;
}

/* MAP */
#map {
  height:300px;
  margin:20px;
  border-radius:10px;
}

/* NEARBY */
.nearby {
  padding:20px;
}

.nearby button {
  margin:5px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#00c6ff;
  color:white;
}
</style>
</head>

<body>

<nav>
  <h2>🚑 RapidRelief PRO</h2>
  <button onclick="logout()">Logout</button>
</nav>

<h3 style="padding-left:20px;">Select Emergency</h3>

<div class="grid">
  <div class="card" onclick="selectType(this,'Medical')">🚑 Medical</div>
  <div class="card" onclick="selectType(this,'Fire')">🔥 Fire</div>
  <div class="card" onclick="selectType(this,'Crime')">🚓 Crime</div>
  <div class="card" onclick="selectType(this,'Mechanical')">🛠 Mechanical</div>
</div>

<button class="sos" onclick="sendSOS()">🚨 SEND SOS</button>
<button class="track" onclick="startTracking()">📍 Start Tracking</button>
<button class="call" onclick="callEmergency()">📞 Call Emergency</button>
<button class="navbtn" onclick="navigateHelp()">🧭 Navigate Help</button>

<div id="map"></div>

<!-- NEARBY (UNCHANGED FEATURE) -->
<div class="nearby">
  <h3>📍 Nearby Help</h3>

  <button onclick="findPlace('hospital')">🚑 Hospital</button>
  <button onclick="findPlace('police')">🚓 Police</button>
  <button onclick="findPlace('fire_station')">🔥 Fire</button>

  <div id="result"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
let selectedType = "Medical";
let map;
let markers=[];
let userLat, userLon;

/* MAP */
navigator.geolocation.getCurrentPosition(pos=>{
  userLat = pos.coords.latitude;
  userLon = pos.coords.longitude;

  map = L.map('map').setView([userLat,userLon],14);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
    .addTo(map);

  L.marker([userLat,userLon])
    .addTo(map)
    .bindPopup("You are here")
    .openPopup();
});

/* CATEGORY */
function selectType(el,type){
  document.querySelectorAll(".card").forEach(c=>c.classList.remove("active"));
  el.classList.add("active");
  selectedType = type;
}

/* SOS */
function sendSOS(){

  new Audio("https://www.soundjay.com/button/beep-07.wav").play();

  fetch("/sos",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      lat:userLat,
      lon:userLon,
      type:selectedType
    })
  });

  alert("🚨 SOS SENT");
}

/* TRACK */
function startTracking(){

  setInterval(()=>{
    navigator.geolocation.getCurrentPosition(pos=>{
      fetch("/track",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          lat:pos.coords.latitude,
          lon:pos.coords.longitude,
          time:new Date().toLocaleString()
        })
      });
    });
  },5000);

  alert("📍 Tracking started");
}

/* 📞 CALL */
function callEmergency(){
  window.location.href = "tel:112";
}

/* 🧭 NAVIGATION */
function navigateHelp(){
  window.open(`https://www.google.com/maps/dir/?api=1&destination=${userLat},${userLon}`);
}

/* 🚨 SMART SOS */
let lastMove = Date.now();

window.addEventListener("devicemotion", (event)=>{
  const acc = event.accelerationIncludingGravity;

  if(acc && (Math.abs(acc.x)>20 || Math.abs(acc.y)>20 || Math.abs(acc.z)>20)){
    autoSOS("Fall detected");
  }

  lastMove = Date.now();
});

setInterval(()=>{
  if(Date.now() - lastMove > 60000){
    autoSOS("No movement");
  }
},10000);

function autoSOS(reason){
  alert("🚨 AUTO SOS: " + reason);
  sendSOS();
}

/* NEARBY (YOUR ORIGINAL FEATURE KEPT) */
function findPlace(type){

  document.getElementById("result").innerHTML = "Finding help...";

  navigator.geolocation.getCurrentPosition(pos => {

    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    const url = `https://api.geoapify.com/v2/places?categories=${type}&filter=circle:${lon},${lat},5000&limit=5&apiKey=4d6c3c60dceb40bd9f2fe3db72b87b5b`;

    fetch(url)
    .then(res => res.json())
    .then(data => {

      if(!data.features.length){
        document.getElementById("result").innerText = "No nearby found ❌";
        return;
      }

      let html="";
      data.features.forEach(f=>{
        html+=`<div>${f.properties.name || "Unknown"}</div>`;
      });

      document.getElementById("result").innerHTML = html;
    });
  });
}

/* LOGOUT */
function logout(){
  window.location.href="/logout";
}
</script>

</body>
</html>
