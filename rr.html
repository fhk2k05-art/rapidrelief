<!DOCTYPE html>
<html>
<head>
<title>RapidRelief Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body {
  margin:0;
  font-family:'Segoe UI',sans-serif;
  color:white;

  background:
  linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
  url("https://images.unsplash.com/photo-1504215680853-026ed2a45def");

  background-size:cover;
}

/* NAV */
nav {
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:rgba(0,0,0,0.6);
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:20px;
}

.card {
  background:#222;
  padding:20px;
  text-align:center;
  cursor:pointer;
  border-radius:10px;
}

.card.active {
  background:#00c6ff;
}

/* BUTTONS */
.sos {
  margin:20px;
  padding:15px;
  width:90%;
  background:red;
  border:none;
  border-radius:20px;
  font-size:18px;
}

.track {
  margin:10px;
  padding:10px;
  background:#00c6ff;
  border:none;
  border-radius:10px;
}

/* MAP */
#map {
  height:300px;
  margin:20px;
  border-radius:10px;
}

/* NEARBY */
.nearby {
  padding:20px;
}

.nearby button {
  margin:5px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#00c6ff;
  color:white;
}

</style>
</head>

<body>

<nav>
  <h2>🚑 RapidRelief</h2>
  <button onclick="logout()">Logout</button>
</nav>

<h3 style="padding-left:20px;">Select Emergency</h3>

<div class="grid">
  <div class="card" onclick="selectType(this,'Medical')">🚑 Medical</div>
  <div class="card" onclick="selectType(this,'Fire')">🔥 Fire</div>
  <div class="card" onclick="selectType(this,'Crime')">🚓 Crime</div>
  <div class="card" onclick="selectType(this,'Mechanical')">🛠 Mechanical</div>
</div>

<button class="sos" onclick="sendSOS()">🚨 SEND SOS</button>

<button class="track" onclick="startTracking()">📍 Start Tracking</button>

<div id="map"></div>

<!-- 🔥 NEARBY FEATURE -->
<div class="nearby">
  <h3>📍 Nearby Help</h3>

  <button onclick="findPlace('hospital')">🚑 Hospital</button>
  <button onclick="findPlace('police')">🚓 Police</button>
  <button onclick="findPlace('fire_station')">🔥 Fire</button>

  <p id="result"></p>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

let selectedType = "Medical";
let map;
let markers=[];

/* MAP INIT */
navigator.geolocation.getCurrentPosition(pos=>{

  map = L.map('map').setView([pos.coords.latitude,pos.coords.longitude],14);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
    .addTo(map);

  L.marker([pos.coords.latitude,pos.coords.longitude])
    .addTo(map)
    .bindPopup("You are here")
    .openPopup();

});

/* CATEGORY */
function selectType(el,type){

  document.querySelectorAll(".card").forEach(c=>c.classList.remove("active"));
  el.classList.add("active");

  selectedType = type;

  let bg={
    Medical:"https://images.unsplash.com/photo-1586773860418-d37222d8fce3",
    Fire:"https://images.unsplash.com/photo-1603398938378-e54eab446dde",
    Crime:"https://images.unsplash.com/photo-1504215680853-026ed2a45def",
    Mechanical:"https://images.unsplash.com/photo-1515923256482-1c04580b477c"
  }[type];

  document.body.style.background =
    `linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('${bg}')`;

  /* SEND CATEGORY DATA */
  navigator.geolocation.getCurrentPosition(async pos=>{

    fetch("/category",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        type,
        lat:pos.coords.latitude,
        lon:pos.coords.longitude
      })
    });

  });

}

/* SOS */
function sendSOS(){

  new Audio("https://www.soundjay.com/button/beep-07.wav").play();

  navigator.geolocation.getCurrentPosition(pos=>{

    fetch("/sos",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        lat:pos.coords.latitude,
        lon:pos.coords.longitude,
        type:selectedType
      })
    });

    alert("🚨 SOS SENT");
  });

}

/* TRACK */
function startTracking(){

  setInterval(()=>{
    navigator.geolocation.getCurrentPosition(pos=>{
      fetch("/track",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          lat:pos.coords.latitude,
          lon:pos.coords.longitude,
          time:new Date().toLocaleString()
        })
      });
    });
  },5000);

  alert("📍 Tracking started");
}

/* 🔍 NEARBY */
function findPlace(type){

  document.getElementById("result").innerText = "Searching... 🔍";

  navigator.geolocation.getCurrentPosition(pos => {

    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    let category = {
      hospital: "healthcare.hospital",
      police: "service.police",
      fire_station: "service.fire_station"
    }[type];

    const url = `https://api.geoapify.com/v2/places?categories=${category}&filter=circle:${lon},${lat},5000&limit=10&apiKey=4d6c3c60dceb40bd9f2fe3db72b87b5b`;

    fetch(url)
    .then(res => res.json())
    .then(data => {

      if(!data.features || data.features.length === 0){
        document.getElementById("result").innerText = "No nearby found ❌";
        return;
      }

      markers.forEach(m => map.removeLayer(m));
      markers = [];

      let text="";

      data.features.forEach(f => {

        const coords = f.geometry.coordinates;
        const name = f.properties.name || "Unknown";

        text += "• " + name + "\n";

        let marker = L.marker([coords[1], coords[0]])
          .addTo(map)
          .bindPopup(name);

        markers.push(marker);
      });

      document.getElementById("result").innerText = text;

    });

  });
}

/* LOGOUT */
function logout(){
  window.location.href="/logout";
}

</script>

</body>
</html>
