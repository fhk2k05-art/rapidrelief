<!DOCTYPE html>
<html>
<head>
<title>RapidRelief Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

/* 🌌 BACKGROUND */
body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  color:white;

  background:
    radial-gradient(circle at 20% 30%, #1e293b, transparent),
    radial-gradient(circle at 80% 70%, #020617, black);
}

/* 🔥 NAVBAR GRID */
nav {
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  padding:12px 30px;

  background:rgba(255,255,255,0.03);
  backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,0.08);
}

/* CENTER LOGO */
.nav-center {
  text-align:center;
}

/* 🔥 BIGGER LOGO */
.logo {
  height:95px;
  object-fit:contain;
}

/* RIGHT SIDE */
.nav-right {
  display:flex;
  justify-content:flex-end;
}

/* 🔴 SMALL LOGOUT */
.logout-btn {
  padding:6px 12px;
  font-size:13px;

  background:linear-gradient(135deg,#ef4444,#dc2626);
  border:none;
  border-radius:8px;

  color:white;
  cursor:pointer;
  transition:0.25s;
}

.logout-btn:hover {
  transform:scale(1.05);
  box-shadow:0 0 10px rgba(239,68,68,0.5);
}

/* SECTION */
.section-title {
  padding:30px 30px 10px;
  opacity:0.8;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px;
  padding:0 30px;
}

/* CARD */
.card {
  background:rgba(255,255,255,0.04);
  padding:30px;
  border-radius:18px;
  text-align:center;
  border:1px solid rgba(255,255,255,0.08);
  transition:0.25s;
}

.card:hover {
  transform:translateY(-5px);
  background:rgba(255,255,255,0.08);
}

.card.active {
  background:linear-gradient(135deg,#0ea5e9,#2563eb);
}

/* BUTTONS */
.btn-group {
  padding:20px 30px;
}

button {
  width:100%;
  padding:15px;
  margin:8px 0;
  border:none;
  border-radius:15px;
  color:white;
  cursor:pointer;
}

.sos { background:#dc2626; }
.track { background:#1e293b; }
.call { background:#ea580c; }
.navbtn { background:#16a34a; }

/* MAP */
#map {
  height:300px;
  margin:20px 30px;
  border-radius:18px;
}

/* NEARBY */
.nearby {
  padding:20px 30px;
}

.nearby button {
  width:auto;
  padding:10px;
  margin:5px;
  border-radius:10px;
  background:#1e293b;
}

</style>
</head>

<body>

<nav>
  <div></div>

  <div class="nav-center">
    <img src="logo.png" class="logo">
  </div>

  <div class="nav-right">
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="section-title">
  <h3>Select Emergency</h3>
</div>

<div class="grid">
  <div class="card" onclick="selectType(this,'Medical')">🚑 Medical</div>
  <div class="card" onclick="selectType(this,'Fire')">🔥 Fire</div>
  <div class="card" onclick="selectType(this,'Crime')">🚓 Crime</div>
  <div class="card" onclick="selectType(this,'Mechanical')">🛠 Mechanical</div>
</div>

<div class="btn-group">
  <button class="sos" onclick="sendSOS()">🚨 SEND SOS</button>
  <button class="track" onclick="startTracking()">📍 Start Tracking</button>
  <button class="call" onclick="callEmergency()">📞 Call Emergency</button>
  <button class="navbtn" onclick="navigateHelp()">🧭 Navigate Help</button>
</div>

<div id="map"></div>

<div class="nearby">
  <h3>📍 Nearby Help</h3>
  <button onclick="findPlace('hospital')">🚑 Hospital</button>
  <button onclick="findPlace('police')">🚓 Police</button>
  <button onclick="findPlace('fire_station')">🔥 Fire</button>
  <div id="result"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* (ALL YOUR EXISTING JS — UNCHANGED) */

let selectedType="Medical";
let map;
let userLat,userLon;
let currentMarker;

navigator.geolocation.getCurrentPosition(pos=>{
  userLat=pos.coords.latitude;
  userLon=pos.coords.longitude;

  map=L.map('map').setView([userLat,userLon],14);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  L.marker([userLat,userLon]).addTo(map)
    .bindPopup("You are here").openPopup();
});

function selectType(el,type){
  document.querySelectorAll(".card").forEach(c=>c.classList.remove("active"));
  el.classList.add("active");
  selectedType=type;

  const bg={
    Medical:"https://images.unsplash.com/photo-1586773860418-d37222d8fce3",
    Fire:"https://images.unsplash.com/photo-1603398938378-e54eab446dde",
    Crime:"https://images.unsplash.com/photo-1504215680853-026ed2a45def",
    Mechanical:"https://images.unsplash.com/photo-1515923256482-1c04580b477c"
  };

  document.body.style.background=
    `linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('${bg[type]}') center/cover`;
}

function sendSOS(){
  fetch("/sos",{method:"POST",headers:{"Content-Type":"application/json"},
  body:JSON.stringify({lat:userLat,lon:userLon,type:selectedType})});
  alert("🚨 SOS SENT");
}

function startTracking(){
  setInterval(()=>{
    navigator.geolocation.getCurrentPosition(pos=>{
      fetch("/track",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({lat:pos.coords.latitude,lon:pos.coords.longitude,time:new Date().toLocaleString()})});
    });
  },5000);
}

function callEmergency(){ window.location.href="tel:112"; }

function navigateHelp(){
  window.open(`https://www.google.com/maps/dir/?api=1&destination=${userLat},${userLon}`);
}

function findPlace(type){
  document.getElementById("result").innerHTML="Finding...";

  navigator.geolocation.getCurrentPosition(pos=>{
    const lat=pos.coords.latitude;
    const lon=pos.coords.longitude;

    const category={
      hospital:"healthcare.hospital",
      police:"service.police",
      fire_station:"service.fire_station"
    }[type];

    fetch(`https://api.geoapify.com/v2/places?categories=${category}&filter=circle:${lon},${lat},5000&limit=10&apiKey=4d6c3c60dceb40bd9f2fe3db72b87b5b`)
    .then(res=>res.json())
    .then(data=>{
      let nearest=null,min=999;

      data.features.forEach(f=>{
        const [lng,lat2]=f.geometry.coordinates;
        const d=getDistance(lat,lon,lat2,lng);
        if(d<min){min=d; nearest={...f,lat:lat2,lon:lng,dist:d};}
      });

      document.getElementById("result").innerHTML=
        `${nearest.properties.name}<br>${nearest.dist.toFixed(2)} km<br>
        <button onclick="navigateTo(${nearest.lat},${nearest.lon})">Navigate</button>`;

      if(currentMarker) map.removeLayer(currentMarker);

      currentMarker=L.marker([nearest.lat,nearest.lon])
        .addTo(map).bindPopup(nearest.properties.name).openPopup();

      map.setView([nearest.lat,nearest.lon],14);
    });
  });
}

function getDistance(a,b,c,d){
  const R=6371;
  const dLat=(c-a)*Math.PI/180;
  const dLon=(d-b)*Math.PI/180;
  const x=Math.sin(dLat/2)**2+
    Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*
    Math.sin(dLon/2)**2;
  return R*(2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)));
}

function navigateTo(lat,lon){
  window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}`);
}

function logout(){ window.location.href="/logout"; }

</script>

</body>
</html>
