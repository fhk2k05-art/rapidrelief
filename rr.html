<!DOCTYPE html>
<html>
<head>
<title>RapidRelief Dashboard PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

/* 🌈 ANIMATED BACKGROUND */
body {
  margin:0;
  font-family:'Segoe UI',sans-serif;
  color:white;

  background:linear-gradient(-45deg,#020617,#0f172a,#020617,#020617);
  background-size:400% 400%;
  animation:bgMove 12s ease infinite;
}

@keyframes bgMove {
  0% {background-position:0% 50%;}
  50% {background-position:100% 50%;}
  100% {background-position:0% 50%;}
}

/* NAV */
nav {
  display:flex;
  justify-content:space-between;
  padding:15px;

  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);

  border-bottom:1px solid rgba(255,255,255,0.1);
}

nav h2 {
  text-shadow:0 0 15px rgba(0,198,255,0.7);
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  padding:20px;
}

/* CARDS */
.card {
  background:rgba(255,255,255,0.08);
  padding:20px;
  text-align:center;
  cursor:pointer;
  border-radius:15px;

  backdrop-filter:blur(15px);
  transition:0.3s;
}

.card:hover {
  transform:translateY(-5px) scale(1.03);
  box-shadow:0 10px 25px rgba(0,0,0,0.6);
}

.card.active {
  background:linear-gradient(135deg,#00c6ff,#0072ff);
  box-shadow:0 0 20px rgba(0,198,255,0.6);
}

/* BUTTONS */
button {
  transition:0.3s;
  color:white;
}

.sos {
  margin:20px;
  padding:16px;
  width:90%;
  background:linear-gradient(135deg,#ff0000,#ff4d4d);
  border:none;
  border-radius:25px;
  font-size:18px;
  box-shadow:0 0 20px rgba(255,0,0,0.5);
}

.sos:hover {
  transform:scale(1.05);
}

.track {
  margin:10px;
  padding:10px;
  background:linear-gradient(135deg,#00c6ff,#0072ff);
  border:none;
  border-radius:12px;
}

.call {
  margin:10px;
  padding:10px;
  background:linear-gradient(135deg,#f97316,#fb923c);
  border:none;
  border-radius:12px;
}

.navbtn {
  margin:10px;
  padding:10px;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  border:none;
  border-radius:12px;
}

button:hover {
  transform:scale(1.05);
  box-shadow:0 0 15px rgba(255,255,255,0.2);
}

/* MAP */
#map {
  height:300px;
  margin:20px;
  border-radius:15px;
  box-shadow:0 15px 40px rgba(0,0,0,0.7);
}

/* NEARBY */
.nearby {
  padding:20px;
}

.nearby button {
  margin:5px;
  padding:10px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#00c6ff,#0072ff);
  color:white;
}

.nearby button:hover {
  box-shadow:0 0 15px rgba(0,198,255,0.5);
}

</style>
</head>

<body>

<nav>
  <h2>🚑 RapidRelief PRO</h2>
  <button onclick="logout()">Logout</button>
</nav>

<h3 style="padding-left:20px;">Select Emergency</h3>

<div class="grid">
  <div class="card" onclick="selectType(this,'Medical')">🚑 Medical</div>
  <div class="card" onclick="selectType(this,'Fire')">🔥 Fire</div>
  <div class="card" onclick="selectType(this,'Crime')">🚓 Crime</div>
  <div class="card" onclick="selectType(this,'Mechanical')">🛠 Mechanical</div>
</div>

<button class="sos" onclick="sendSOS()">🚨 SEND SOS</button>
<button class="track" onclick="startTracking()">📍 Start Tracking</button>
<button class="call" onclick="callEmergency()">📞 Call Emergency</button>
<button class="navbtn" onclick="navigateHelp()">🧭 Navigate Help</button>

<div id="map"></div>

<div class="nearby">
  <h3>📍 Nearby Help</h3>

  <button onclick="findPlace('hospital')">🚑 Hospital</button>
  <button onclick="findPlace('police')">🚓 Police</button>
  <button onclick="findPlace('fire_station')">🔥 Fire</button>

  <div id="result"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

let selectedType = "Medical";
let map;
let markers=[];
let userLat, userLon;

/* MAP */
navigator.geolocation.getCurrentPosition(pos=>{
  userLat = pos.coords.latitude;
  userLon = pos.coords.longitude;

  map = L.map('map').setView([userLat,userLon],14);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
    .addTo(map);

  L.marker([userLat,userLon])
    .addTo(map)
    .bindPopup("You are here")
    .openPopup();
});

/* CATEGORY */
function selectType(el,type){
  document.querySelectorAll(".card").forEach(c=>c.classList.remove("active"));
  el.classList.add("active");
  selectedType = type;
}

/* SOS */
function sendSOS(){
  new Audio("https://www.soundjay.com/button/beep-07.wav").play();

  fetch("/sos",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      lat:userLat,
      lon:userLon,
      type:selectedType
    })
  });

  alert("🚨 SOS SENT");
}

/* TRACK */
function startTracking(){
  setInterval(()=>{
    navigator.geolocation.getCurrentPosition(pos=>{
      fetch("/track",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          lat:pos.coords.latitude,
          lon:pos.coords.longitude,
          time:new Date().toLocaleString()
        })
      });
    });
  },5000);

  alert("📍 Tracking started");
}

/* CALL */
function callEmergency(){
  window.location.href = "tel:112";
}

/* NAVIGATION */
function navigateHelp(){
  window.open(`https://www.google.com/maps/dir/?api=1&destination=${userLat},${userLon}`);
}

/* SMART SOS */
let lastMove = Date.now();

window.addEventListener("devicemotion", (event)=>{
  const acc = event.accelerationIncludingGravity;

  if(acc && (Math.abs(acc.x)>20 || Math.abs(acc.y)>20 || Math.abs(acc.z)>20)){
    autoSOS("Fall detected");
  }

  lastMove = Date.now();
});

setInterval(()=>{
  if(Date.now() - lastMove > 60000){
    autoSOS("No movement");
  }
},10000);

function autoSOS(reason){
  alert("🚨 AUTO SOS: " + reason);
  sendSOS();
}

/* NEARBY */
function findPlace(type){

  document.getElementById("result").innerHTML = "Finding help...";

  navigator.geolocation.getCurrentPosition(pos => {

    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    const url = `https://api.geoapify.com/v2/places?categories=${type}&filter=circle:${lon},${lat},5000&limit=5&apiKey=4d6c3c60dceb40bd9f2fe3db72b87b5b`;

    fetch(url)
    .then(res => res.json())
    .then(data => {

      if(!data.features.length){
        document.getElementById("result").innerText = "No nearby found ❌";
        return;
      }

      let html="";
      data.features.forEach(f=>{
        html+=`<div>${f.properties.name || "Unknown"}</div>`;
      });

      document.getElementById("result").innerHTML = html;
    });
  });
}

/* LOGOUT */
function logout(){
  window.location.href="/logout";
}

</script>

</body>
</html>
