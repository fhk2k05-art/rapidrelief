<!DOCTYPE html>
<html>
<head>
<title>RapidRelief Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

/* 🌌 BACKGROUND */
body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  color:white;

  background:
    radial-gradient(circle at 20% 30%, #1e293b, transparent),
    radial-gradient(circle at 80% 70%, #020617, black);
}

/* 🔥 NAVBAR */
.navbar {
  position:relative;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px 0;

  background:rgba(255,255,255,0.03);
  backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,0.08);
}

/* LOGO */
.logo {
  height:140px;
}

/* LOGOUT ICON */
.logout-icon {
  position:absolute;
  right:25px;
  top:25px;
  width:30px;
  height:30px;
  cursor:pointer;
  opacity:0.8;
  transition:0.25s;
  filter:invert(1);
}

.logout-icon:hover {
  transform:scale(1.15);
  opacity:1;
}

/* SECTION */
.section-title {
  padding:30px;
  opacity:0.8;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px;
  padding:0 30px;
}

/* CARD */
.card {
  background:rgba(255,255,255,0.04);
  padding:25px;
  border-radius:18px;
  text-align:center;
  border:1px solid rgba(255,255,255,0.08);
  transition:0.25s;
}

.card:hover {
  transform:translateY(-5px);
  background:rgba(255,255,255,0.08);
}

.card.active {
  background:linear-gradient(135deg,#0ea5e9,#2563eb);
}

/* ICON */
.card-icon {
  width:60px;
  height:60px;
  margin-bottom:10px;
  object-fit:contain;
  filter:invert(1);
}

/* TEXT */
.card p {
  margin:0;
  font-size:16px;
}

/* BUTTONS */
.btn-group {
  padding:20px 30px;
}

button {
  width:100%;
  padding:15px;
  margin:8px 0;
  border:none;
  border-radius:15px;
  color:white;
  cursor:pointer;
}

.sos { background:#dc2626; }
.track { background:#1e293b; }
.call { background:#ea580c; }
.navbtn { background:#16a34a; }

/* MAP */
#map {
  height:300px;
  margin:20px 30px;
  border-radius:18px;
}

/* NEARBY */
.nearby {
  padding:20px 30px;
}

.nearby button {
  width:auto;
  padding:10px;
  margin:5px;
  border-radius:10px;
  background:#1e293b;
}

</style>
</head>

<body>

<nav class="navbar">
  <img src="logo.png" class="logo">
  <img src="logout.png" class="logout-icon" onclick="logout()">
</nav>

<div class="section-title">
  <h3>Select Emergency</h3>
</div>

<div class="grid">
  <div class="card" onclick="selectType(this,'Medical')">
    <img src="medical.png" class="card-icon">
    <p>Medical</p>
  </div>

  <div class="card" onclick="selectType(this,'Fire')">
    <img src="fire.png" class="card-icon">
    <p>Fire</p>
  </div>

  <div class="card" onclick="selectType(this,'Crime')">
    <img src="crime.png" class="card-icon">
    <p>Crime</p>
  </div>

  <div class="card" onclick="selectType(this,'Mechanical')">
    <img src="mechanical.png" class="card-icon">
    <p>Mechanical</p>
  </div>
</div>

<div class="btn-group">
  <button class="sos" onclick="sendSOS()">🚨 SEND SOS</button>
  <button class="track" onclick="startTracking()">📍 Start Tracking</button>
  <button class="call" onclick="callEmergency()">📞 Call Emergency</button>
  <button class="navbtn" onclick="navigateHelp()">🧭 Navigate Help</button>
</div>

<div id="map"></div>

<div class="nearby">
  <h3>📍 Nearby Help</h3>
  <button onclick="findPlace('hospital')">🚑 Hospital</button>
  <button onclick="findPlace('police')">🚓 Police</button>
  <button onclick="findPlace('fire_station')">🔥 Fire</button>
  <div id="result"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* SAME FUNCTIONALITY */

let selectedType="Medical";
let map;
let userLat,userLon;
let currentMarker;

navigator.geolocation.getCurrentPosition(pos=>{
  userLat=pos.coords.latitude;
  userLon=pos.coords.longitude;

  map=L.map('map').setView([userLat,userLon],14);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

  L.marker([userLat,userLon]).addTo(map)
    .bindPopup("You are here").openPopup();
});

function selectType(el,type){
  document.querySelectorAll(".card").forEach(c=>c.classList.remove("active"));
  el.classList.add("active");
  selectedType=type;
}

function sendSOS(){
  fetch("/sos",{method:"POST",headers:{"Content-Type":"application/json"},
  body:JSON.stringify({lat:userLat,lon:userLon,type:selectedType})});
  alert("🚨 SOS SENT");
}

function startTracking(){
  setInterval(()=>{
    navigator.geolocation.getCurrentPosition(pos=>{
      fetch("/track",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({lat:pos.coords.latitude,lon:pos.coords.longitude,time:new Date().toLocaleString()})});
    });
  },5000);
}

function callEmergency(){ window.location.href="tel:112"; }

function navigateHelp(){
  window.open(`https://www.google.com/maps/dir/?api=1&destination=${userLat},${userLon}`);
}

function findPlace(type){
  document.getElementById("result").innerHTML="Finding...";

  navigator.geolocation.getCurrentPosition(pos=>{
    const lat=pos.coords.latitude;
    const lon=pos.coords.longitude;

    const category={
      hospital:"healthcare.hospital",
      police:"service.police",
      fire_station:"service.fire_station"
    }[type];

    fetch(`https://api.geoapify.com/v2/places?categories=${category}&filter=circle:${lon},${lat},5000&limit=10&apiKey=4d6c3c60dceb40bd9f2fe3db72b87b5b`)
    .then(res=>res.json())
    .then(data=>{
      let nearest=null,min=999;

      data.features.forEach(f=>{
        const [lng,lat2]=f.geometry.coordinates;
        const d=getDistance(lat,lon,lat2,lng);
        if(d<min){min=d; nearest={...f,lat:lat2,lon:lng,dist:d};}
      });

      document.getElementById("result").innerHTML=
        `${nearest.properties.name}<br>${nearest.dist.toFixed(2)} km<br>
        <button onclick="navigateTo(${nearest.lat},${nearest.lon})">Navigate</button>`;

      if(currentMarker) map.removeLayer(currentMarker);

      currentMarker=L.marker([nearest.lat,nearest.lon])
        .addTo(map).bindPopup(nearest.properties.name).openPopup();

      map.setView([nearest.lat,nearest.lon],14);
    });
  });
}

function getDistance(a,b,c,d){
  const R=6371;
  const dLat=(c-a)*Math.PI/180;
  const dLon=(d-b)*Math.PI/180;
  const x=Math.sin(dLat/2)**2+
    Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*
    Math.sin(dLon/2)**2;
  return R*(2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)));
}

function navigateTo(lat,lon){
  window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}`);
}

function logout(){ window.location.href="/logout"; }

</script>

</body>
</html>
