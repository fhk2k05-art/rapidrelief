<!DOCTYPE html>
<html>
<head>
<title>RapidRelief Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

/* 🌌 BACKGROUND */
body {
  margin:0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  color:white;

  background:
    radial-gradient(circle at 20% 30%, #1e293b, transparent),
    radial-gradient(circle at 80% 70%, #020617, black);
}

/* NAV */
nav {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 30px;

  background:rgba(255,255,255,0.03);
  backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,0.08);
}

nav h2 {
  font-size:20px;
  font-weight:600;
}

/* SECTION TITLE */
.section-title {
  padding:30px 30px 10px;
  opacity:0.8;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px;
  padding:0 30px 10px;
}

/* CARD */
.card {
  background:rgba(255,255,255,0.04);
  padding:30px;
  border-radius:18px;
  text-align:center;
  font-size:18px;

  border:1px solid rgba(255,255,255,0.08);

  transition:all 0.25s ease;
}

.card:hover {
  transform:translateY(-6px);
  background:rgba(255,255,255,0.08);
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.card.active {
  background:linear-gradient(135deg,#0ea5e9,#2563eb);
}

/* BUTTON GROUP */
.btn-group {
  padding:20px 30px;
}

button {
  width:100%;
  padding:16px;
  margin:8px 0;
  border:none;
  border-radius:16px;
  font-size:16px;
  color:white;
  cursor:pointer;
  transition:all 0.25s ease;
}

/* BUTTON COLORS */
.sos { background:linear-gradient(135deg,#ef4444,#dc2626); font-size:18px; }
.track { background:#1e293b; }
.call { background:#ea580c; }
.navbtn { background:#16a34a; }

button:hover {
  transform:scale(1.02);
  opacity:0.9;
}

/* MAP */
#map {
  height:300px;
  margin:20px 30px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 20px 50px rgba(0,0,0,0.7);
}

/* NEARBY */
.nearby {
  padding:20px 30px;
}

.nearby h3 {
  margin-bottom:10px;
}

.nearby button {
  width:auto;
  padding:10px 16px;
  margin:5px;
  border-radius:12px;
  background:#1e293b;
}

.nearby button:hover {
  background:#334155;
}

</style>
</head>

<body>

<nav>
  <h2>🚑 RapidRelief</h2>
  <button onclick="logout()">Logout</button>
</nav>

<div class="section-title">
  <h3>Select Emergency</h3>
</div>

<div class="grid">
  <div class="card" onclick="selectType(this,'Medical')">🚑 Medical</div>
  <div class="card" onclick="selectType(this,'Fire')">🔥 Fire</div>
  <div class="card" onclick="selectType(this,'Crime')">🚓 Crime</div>
  <div class="card" onclick="selectType(this,'Mechanical')">🛠 Mechanical</div>
</div>

<div class="btn-group">
  <button class="sos" onclick="sendSOS()">🚨 SEND SOS</button>
  <button class="track" onclick="startTracking()">📍 Start Tracking</button>
  <button class="call" onclick="callEmergency()">📞 Call Emergency</button>
  <button class="navbtn" onclick="navigateHelp()">🧭 Navigate Help</button>
</div>

<div id="map"></div>

<div class="nearby">
  <h3>📍 Nearby Help</h3>

  <button onclick="findPlace('hospital')">🚑 Hospital</button>
  <button onclick="findPlace('police')">🚓 Police</button>
  <button onclick="findPlace('fire_station')">🔥 Fire</button>

  <div id="result"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
let selectedType = "Medical";
let map;
let userLat, userLon;

/* MAP */
navigator.geolocation.getCurrentPosition(pos=>{
  userLat = pos.coords.latitude;
  userLon = pos.coords.longitude;

  map = L.map('map').setView([userLat,userLon],14);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
    .addTo(map);

  L.marker([userLat,userLon])
    .addTo(map)
    .bindPopup("You are here")
    .openPopup();
});

/* CATEGORY */
function selectType(el,type){
  document.querySelectorAll(".card").forEach(c=>c.classList.remove("active"));
  el.classList.add("active");
  selectedType = type;
}

/* SOS */
function sendSOS(){
  new Audio("https://www.soundjay.com/button/beep-07.wav").play();

  fetch("/sos",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      lat:userLat,
      lon:userLon,
      type:selectedType
    })
  });

  alert("🚨 SOS SENT");
}

/* TRACK */
function startTracking(){
  setInterval(()=>{
    navigator.geolocation.getCurrentPosition(pos=>{
      fetch("/track",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          lat:pos.coords.latitude,
          lon:pos.coords.longitude,
          time:new Date().toLocaleString()
        })
      });
    });
  },5000);

  alert("📍 Tracking started");
}

/* CALL */
function callEmergency(){
  window.location.href = "tel:112";
}

/* NAVIGATION */
function navigateHelp(){
  window.open(`https://www.google.com/maps/dir/?api=1&destination=${userLat},${userLon}`);
}

/* SMART SOS */
let lastMove = Date.now();

window.addEventListener("devicemotion", (event)=>{
  const acc = event.accelerationIncludingGravity;

  if(acc && (Math.abs(acc.x)>20 || Math.abs(acc.y)>20 || Math.abs(acc.z)>20)){
    autoSOS("Fall detected");
  }

  lastMove = Date.now();
});

setInterval(()=>{
  if(Date.now() - lastMove > 60000){
    autoSOS("No movement");
  }
},10000);

function autoSOS(reason){
  alert("🚨 AUTO SOS: " + reason);
  sendSOS();
}

/* NEARBY */
function findPlace(type){
  document.getElementById("result").innerHTML = "Finding help...";

  navigator.geolocation.getCurrentPosition(pos => {

    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    const url = `https://api.geoapify.com/v2/places?categories=${type}&filter=circle:${lon},${lat},5000&limit=5&apiKey=4d6c3c60dceb40bd9f2fe3db72b87b5b`;

    fetch(url)
    .then(res => res.json())
    .then(data => {

      if(!data.features.length){
        document.getElementById("result").innerText = "No nearby found ❌";
        return;
      }

      let html="";
      data.features.forEach(f=>{
        html+=`<div>${f.properties.name || "Unknown"}</div>`;
      });

      document.getElementById("result").innerHTML = html;
    });
  });
}

/* LOGOUT */
function logout(){
  window.location.href="/logout";
}
</script>

</body>
</html>
