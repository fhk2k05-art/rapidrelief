<!DOCTYPE html>
<html>
<head>
<title>RapidRelief Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body {
  margin:0;
  font-family:'Segoe UI',sans-serif;
  color:white;

  background:
  linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
  url("https://images.unsplash.com/photo-1504215680853-026ed2a45def");

  background-size:cover;
  background-position:center;
}

/* NAV */
nav {
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:rgba(0,0,0,0.6);
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:20px;
}

.card {
  background:#222;
  padding:20px;
  text-align:center;
  cursor:pointer;
  border-radius:10px;
}

.card.active {
  background:#00c6ff;
}

/* BUTTONS */
.sos {
  margin:20px;
  padding:15px;
  width:90%;
  background:red;
  border:none;
  border-radius:20px;
  font-size:18px;
}

.track {
  margin:10px;
  padding:10px;
  background:#00c6ff;
  border:none;
  border-radius:10px;
}

/* MAP */
#map {
  height:300px;
  margin:20px;
  border-radius:10px;
}

</style>
</head>

<body>

<nav>
  <h2>🚑 RapidRelief</h2>
  <button onclick="logout()">Logout</button>
</nav>

<h3 style="padding-left:20px;">Select Emergency</h3>

<div class="grid">
  <div class="card" onclick="selectType(this,'Medical')">🚑 Medical</div>
  <div class="card" onclick="selectType(this,'Fire')">🔥 Fire</div>
  <div class="card" onclick="selectType(this,'Crime')">🚓 Crime</div>
  <div class="card" onclick="selectType(this,'Mechanical')">🛠 Mechanical</div>
</div>

<button class="sos" onclick="sendSOS()">🚨 SEND SOS</button>

<button class="track" onclick="startTracking()">📍 Start Tracking</button>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

let selectedType = "Medical";
let map;

/* MAP INIT */
navigator.geolocation.getCurrentPosition(pos=>{

  map = L.map('map').setView([pos.coords.latitude,pos.coords.longitude],14);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
    .addTo(map);

  L.marker([pos.coords.latitude,pos.coords.longitude])
    .addTo(map)
    .bindPopup("You are here")
    .openPopup();

});

/* CATEGORY */
function selectType(el,type){

  document.querySelectorAll(".card").forEach(c=>c.classList.remove("active"));
  el.classList.add("active");

  selectedType = type;

  let bg={
    Medical:"https://images.unsplash.com/photo-1586773860418-d37222d8fce3",
    Fire:"https://images.unsplash.com/photo-1603398938378-e54eab446dde",
    Crime:"https://images.unsplash.com/photo-1504215680853-026ed2a45def",
    Mechanical:"https://images.unsplash.com/photo-1515923256482-1c04580b477c"
  }[type];

  document.body.style.background =
    `linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('${bg}')`;

  /* SEND CATEGORY DATA */
  navigator.geolocation.getCurrentPosition(async pos=>{

    let ip="unknown";

    try{
      let res=await fetch("https://api.ipify.org?format=json");
      let data=await res.json();
      ip=data.ip;
    }catch{}

    fetch("/category",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        type,
        lat:pos.coords.latitude,
        lon:pos.coords.longitude,
        ip,
        time:new Date().toLocaleString()
      })
    });

  });

}

/* SOS */
function sendSOS(){

  new Audio("https://www.soundjay.com/button/beep-07.wav").play();

  navigator.geolocation.getCurrentPosition(pos=>{

    fetch("/sos",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        lat:pos.coords.latitude,
        lon:pos.coords.longitude,
        type:selectedType
      })
    });

    alert("🚨 SOS SENT");
  });

}

/* TRACK */
function startTracking(){

  setInterval(()=>{

    navigator.geolocation.getCurrentPosition(pos=>{

      fetch("/track",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          lat:pos.coords.latitude,
          lon:pos.coords.longitude,
          time:new Date().toLocaleString()
        })
      });

    });

  },5000);

  alert("📍 Tracking started");
}

/* LOGOUT */
function logout(){
  window.location.href="/logout";
}

</script>

</body>
</html>
