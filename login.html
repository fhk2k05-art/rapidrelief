<!DOCTYPE html>
<html>
<head>
<title>RapidRelief Login</title>

<style>

/* 🔥 ULTRA PREMIUM BACKGROUND */
body {
  margin:0;
  font-family:Segoe UI;

  background:
    radial-gradient(circle at 20% 30%, rgba(14,165,233,0.15), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(99,102,241,0.15), transparent 40%),
    linear-gradient(135deg, #020617, #020617);

  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* GLASS CARD */
.container {
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(12px);
  padding:30px;
  border-radius:20px;
  width:320px;
  text-align:center;
  color:white;

  /* 💎 PREMIUM GLOW */
  box-shadow:
    0 0 40px rgba(0,0,0,0.7),
    0 0 60px rgba(14,165,233,0.15);
}

/* LOGO */
.login-logo{
  width:200px;
  margin-bottom:20px;
}

/* INPUT */
input {
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:8px;
}

/* BUTTON ROW */
.btn-row {
  display:flex;
  justify-content:space-between;
}

/* BUTTONS */
button {
  border:none;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
  width:48%;
  color:white;
}

.login-btn { background:#06b6d4; }
.register-btn { background:#16a34a; }

/* FACE */
.face-box {
  margin-top:20px;
}

video {
  width:200px;
  border-radius:10px;
  display:none;
}

.face-btn {
  margin-top:10px;
  background:#f59e0b;
  width:100%;
}

</style>

</head>

<body>

<div class="container">

  <img src="logo.png" class="login-logo">

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <div class="btn-row">
    <button class="login-btn" onclick="login()">Login</button>
    <button class="register-btn" onclick="register()">Register</button>
  </div>

  <hr>

  <h3>Face Login</h3>

  <div class="face-box">
    <video id="video" autoplay playsinline></video>
    <button class="face-btn" onclick="openCamera()">Use Face</button>
  </div>

</div>

<script>

let stream;

/* CAMERA */
function openCamera(){
  navigator.mediaDevices.getUserMedia({video:true})
  .then(s=>{
    stream=s;
    const video=document.getElementById("video");
    video.srcObject=stream;
    video.style.display="block";
  })
  .catch(()=>alert("Camera denied ❌"));
}

/* LOGIN */
function login(){

  const username=document.getElementById("email").value.trim();
  const password=document.getElementById("password").value.trim();

  if(!username || !password){
    alert("Please fill all fields ❌");
    return;
  }

  fetch("/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ username, password })
  })
  .then(res=>res.json())
  .then(data=>{
    if(data.status==="user"){
      window.location="/dashboard";
    } 
    else if(data.status==="admin"){
      window.location="/admin";
    } 
    else {
      alert("Login failed ❌");
    }
  });
}

/* REGISTER */
function register(){

  const username=document.getElementById("email").value.trim();
  const password=document.getElementById("password").value.trim();

  if(!username || !password){
    alert("Fill all fields ❌");
    return;
  }

  fetch("/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ username, password })
  })
  .then(res=>res.json())
  .then(data=>{
    if(data.status==="registered"){
      alert("Registered ✅");
    } else if(data.status==="exists"){
      alert("User already exists ❌");
    } else {
      alert("Error ❌");
    }
  });
}

</script>

</body>
</html>
