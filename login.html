<!DOCTYPE html>
<html>
<head>
<title>Login - RapidRelief</title>

<style>

body {
  margin:0;
  font-family:'Segoe UI',sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;

  background:
  linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
  url("https://images.unsplash.com/photo-1584433144859-1fc3ab64a957");

  background-size:cover;
  color:white;
}

.box {
  background:rgba(255,255,255,0.1);
  padding:30px;
  border-radius:15px;
  backdrop-filter:blur(10px);
  width:300px;
  text-align:center;
}

input {
  width:90%;
  margin:10px;
  padding:10px;
  border:none;
  border-radius:8px;
}

button {
  width:95%;
  padding:10px;
  margin:10px;
  border:none;
  border-radius:8px;
  background:#00c6ff;
  color:white;
  cursor:pointer;
}

.toggle {
  color:#00c6ff;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="box">

<h2 id="title">Login</h2>

<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">

<button onclick="submitForm()">Login</button>

<p>
  <span id="toggleText">Don't have an account?</span>
  <span class="toggle" onclick="toggleMode()">Register</span>
</p>

</div>

<script>

let isLogin = true;

/* 🔄 SWITCH LOGIN/REGISTER */
function toggleMode(){
  isLogin = !isLogin;

  document.getElementById("title").innerText = isLogin ? "Login" : "Register";
  document.querySelector("button").innerText = isLogin ? "Login" : "Register";
  document.getElementById("toggleText").innerText =
    isLogin ? "Don't have an account?" : "Already have an account?";
}

/* 🚀 SUBMIT */
function submitForm(){

  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  if(!username || !password){
    alert("Enter all fields ⚠️");
    return;
  }

  const url = isLogin ? "/login" : "/register";

  fetch(url,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username,password})
  })
  .then(res=>res.json())
  .then(data=>{

    /* 🔐 LOGIN */
    if(isLogin){

      if(data.status === "admin"){
        window.location.href = "/admin";
      }
      else if(data.status === "user"){
        window.location.href = "/dashboard";
      }
      else{
        alert("Login failed ❌");
      }

    }

    /* 📝 REGISTER */
    else{

      if(data.status === "registered"){
        alert("Registered successfully ✅");
        toggleMode();
      }
      else if(data.status === "exists"){
        alert("User already exists ⚠️");
      }
      else{
        alert("Registration failed ❌");
      }

    }

  })
  .catch(()=>{
    alert("Server error ❌");
  });

}

</script>

</body>
</html>
