<!DOCTYPE html>
<html>
<head>
<title>RapidRelief Login</title>

<style>

/* 🔥 ULTRA PREMIUM BACKGROUND */
body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;

  background:
    linear-gradient(rgba(2,6,23,0.85), rgba(2,6,23,0.95)),
    url("https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5") no-repeat center/cover;

  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* 💎 GLASS CARD */
.container {
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  padding:35px;
  border-radius:22px;
  width:340px;
  text-align:center;
  color:white;

  box-shadow:
    0 10px 40px rgba(0,0,0,0.6),
    0 0 60px rgba(14,165,233,0.15);
}

/* LOGO */
.login-logo{
  width:220px;
  margin-bottom:20px;
}

/* INPUT */
input {
  width:100%;
  padding:12px;
  margin:12px 0;
  border:none;
  border-radius:10px;
  outline:none;

  background:rgba(255,255,255,0.08);
  color:white;
}

input::placeholder {
  color:rgba(255,255,255,0.6);
}

/* BUTTON ROW */
.btn-row {
  display:flex;
  gap:10px;
}

/* BUTTONS */
button {
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  color:white;
  font-weight:500;
  transition:0.25s;
}

/* BUTTON EFFECTS */
.login-btn {
  background:linear-gradient(135deg,#0ea5e9,#2563eb);
}

.register-btn {
  background:linear-gradient(135deg,#22c55e,#16a34a);
}

button:hover {
  transform:translateY(-2px);
  box-shadow:0 5px 15px rgba(0,0,0,0.5);
}

/* FACE */
.face-box {
  margin-top:20px;
}

video {
  width:100%;
  border-radius:12px;
  display:none;
  margin-top:10px;
}

.face-btn {
  margin-top:10px;
  background:linear-gradient(135deg,#f59e0b,#ea580c);
  width:100%;
}

/* DIVIDER */
hr {
  border:0;
  height:1px;
  background:rgba(255,255,255,0.1);
  margin:20px 0;
}

</style>

</head>

<body>

<div class="container">

  <img src="logo.png" class="login-logo">

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <div class="btn-row">
    <button class="login-btn" onclick="login()">Login</button>
    <button class="register-btn" onclick="register()">Register</button>
  </div>

  <hr>

  <h3>Face Login</h3>

  <div class="face-box">
    <video id="video" autoplay playsinline></video>
    <button class="face-btn" onclick="openCamera()">Use Face</button>
  </div>

</div>

<script>

let stream;

/* CAMERA */
function openCamera(){
  navigator.mediaDevices.getUserMedia({video:true})
  .then(s=>{
    stream=s;
    const video=document.getElementById("video");
    video.srcObject=stream;
    video.style.display="block";
  })
  .catch(()=>alert("Camera denied ❌"));
}

/* LOGIN */
function login(){
  const username=document.getElementById("email").value.trim();
  const password=document.getElementById("password").value.trim();

  if(!username || !password){
    alert("Please fill all fields ❌");
    return;
  }

  fetch("/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ username, password })
  })
  .then(res=>res.json())
  .then(data=>{
    if(data.status==="user"){
      window.location="/dashboard";
    } 
    else if(data.status==="admin"){
      window.location="/admin";
    } 
    else {
      alert("Login failed ❌");
    }
  });
}

/* REGISTER */
function register(){
  const username=document.getElementById("email").value.trim();
  const password=document.getElementById("password").value.trim();

  if(!username || !password){
    alert("Fill all fields ❌");
    return;
  }

  fetch("/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ username, password })
  })
  .then(res=>res.json())
  .then(data=>{
    if(data.status==="registered"){
      alert("Registered ✅");
    } else if(data.status==="exists"){
      alert("User already exists ❌");
    }
  });
}

</script>

</body>
</html>
