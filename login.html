<!DOCTYPE html>
<html>
<head>
<title>RapidRelief Login</title>

<style>

/* BACKGROUND */
body {
  margin:0;
  font-family:Segoe UI;
  background:url("https://images.unsplash.com/photo-1519389950473-47ba0277781c") no-repeat center/cover;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* GLASS CARD */
.container {
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(10px);
  padding:30px;
  border-radius:20px;
  width:320px;
  text-align:center;
  color:white;
}

/* INPUT */
input {
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:8px;
}

/* BUTTONS */
.btn-row {
  display:flex;
  justify-content:space-between;
}

.login-btn {
  background:#06b6d4;
  color:white;
}

.register-btn {
  background:#16a34a;
  color:white;
}

button {
  border:none;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
  width:48%;
}

/* FACE SECTION */
.face-box {
  margin-top:20px;
}

video {
  width:200px;
  border-radius:10px;
  display:none;
}

.face-btn {
  margin-top:10px;
  background:#f59e0b;
  color:white;
  width:100%;
}

</style>

</head>

<body>

<div class="container">

  <h2>RapidRelief Login</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <div class="btn-row">
    <button class="login-btn" onclick="login()">Login</button>
    <button class="register-btn" onclick="register()">Register</button>
  </div>

  <hr>

  <h3>Face Login</h3>

  <div class="face-box">
    <video id="video" autoplay playsinline></video>

    <button class="face-btn" onclick="openCamera()">Use Face</button>
  </div>

</div>

<script>

let stream;

/* ✅ CAMERA ONLY WHEN CLICKED */
function openCamera(){
  navigator.mediaDevices.getUserMedia({video:true})
  .then(s=>{
    stream=s;

    const video=document.getElementById("video");
    video.srcObject=stream;

    video.style.display="block";
  })
  .catch(()=>{
    alert("Camera permission denied ❌");
  });
}

/* LOGIN */
function login(){
  fetch("/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email:document.getElementById("email").value,
      password:document.getElementById("password").value
    })
  })
  .then(res=>res.text())
  .then(msg=>{
    if(msg==="success") window.location="rr.html";
    else alert("Login failed ❌");
  });
}

/* REGISTER */
function register(){
  fetch("/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email:document.getElementById("email").value,
      password:document.getElementById("password").value
    })
  })
  .then(res=>res.text())
  .then(msg=>alert(msg));
}

</script>

</body>
</html>
