<!DOCTYPE html>
<html>
<head>
<title>RapidRelief Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* 🌌 BASE */
body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:#020617;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

/* 🌟 PARTICLES */
canvas {
  position:absolute;
  top:0;
  left:0;
  z-index:0;
}

/* 🟢 GLOW */
.glow {
  position:absolute;
  width:250px;
  height:250px;
  background:radial-gradient(circle, rgba(14,165,233,0.25), transparent 60%);
  pointer-events:none;
  border-radius:50%;
  transform:translate(-50%, -50%);
}

/* 💎 CARD */
.container {
  position:relative;
  z-index:2;

  width:90%;
  max-width:360px;
  padding:25px;

  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(25px);
  border-radius:20px;

  text-align:center;
  color:white;

  box-shadow:
    0 10px 40px rgba(0,0,0,0.8),
    0 0 80px rgba(14,165,233,0.2);

  transition:transform 0.1s ease;
}

/* LOGO */
.login-logo{
  width:70%;
  max-width:220px;
  margin-bottom:15px;
}

/* INPUT */
input {
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:10px;
  outline:none;
  background:rgba(255,255,255,0.08);
  color:white;
}

/* BUTTON ROW */
.btn-row {
  display:flex;
  gap:10px;
}

/* BUTTONS */
button {
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  color:white;
  font-size:14px;
}

.login-btn { background:linear-gradient(135deg,#0ea5e9,#2563eb); }
.register-btn { background:linear-gradient(135deg,#22c55e,#16a34a); }

button:hover {
  transform:scale(1.05);
}

/* FACE */
video {
  width:100%;
  border-radius:10px;
  display:none;
}

.face-btn {
  margin-top:10px;
  background:linear-gradient(135deg,#f59e0b,#ea580c);
  width:100%;
}

/* MOBILE */
@media (max-width:480px){
  body { overflow:auto; }

  .container {
    width:95%;
    padding:20px;
  }

  .btn-row {
    flex-direction:column;
  }

  button {
    width:100%;
  }

  .glow {
    width:180px;
    height:180px;
  }
}

</style>
</head>

<body>

<canvas id="particles"></canvas>
<div class="glow" id="glow"></div>

<div class="container" id="card">

  <img src="logo.png" class="login-logo">

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <div class="btn-row">
    <button class="login-btn" onclick="login()">Login</button>
    <button class="register-btn" onclick="register()">Register</button>
  </div>

  <hr>

  <h3>Face Login</h3>

  <video id="video" autoplay playsinline></video>
  <button class="face-btn" onclick="openCamera()">Use Face</button>

</div>

<script>

/* 🌟 PARTICLES */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

function resizeCanvas(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

let particles=[];

for(let i=0;i<100;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2,
    dx:(Math.random()-0.5),
    dy:(Math.random()-0.5)
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle="white";
    ctx.fill();

    p.x+=p.dx;
    p.y+=p.dy;

    if(p.x<0||p.x>canvas.width) p.dx*=-1;
    if(p.y<0||p.y>canvas.height) p.dy*=-1;
  });

  requestAnimationFrame(animate);
}
animate();

/* 🟢 GLOW FOLLOW */
const glow=document.getElementById("glow");
document.addEventListener("mousemove",e=>{
  glow.style.left=e.clientX+"px";
  glow.style.top=e.clientY+"px";
});

/* 🧊 3D TILT */
const card=document.getElementById("card");
document.addEventListener("mousemove",e=>{
  let x=(window.innerWidth/2 - e.clientX)/25;
  let y=(window.innerHeight/2 - e.clientY)/25;
  card.style.transform=`rotateY(${x}deg) rotateX(${y}deg)`;
});

/* CAMERA */
let stream;
function openCamera(){
  navigator.mediaDevices.getUserMedia({video:true})
  .then(s=>{
    stream=s;
    const video=document.getElementById("video");
    video.srcObject=stream;
    video.style.display="block";
  })
  .catch(()=>alert("Camera denied ❌"));
}

/* LOGIN */
function login(){
  const username=document.getElementById("email").value.trim();
  const password=document.getElementById("password").value.trim();

  if(!username || !password){
    alert("Fill all fields ❌");
    return;
  }

  fetch("/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ username, password })
  })
  .then(res=>res.json())
  .then(data=>{
    if(data.status==="user") window.location="/dashboard";
    else if(data.status==="admin") window.location="/admin";
    else alert("Login failed ❌");
  });
}

/* REGISTER */
function register(){
  const username=document.getElementById("email").value.trim();
  const password=document.getElementById("password").value.trim();

  if(!username || !password){
    alert("Fill all fields ❌");
    return;
  }

  fetch("/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ username, password })
  })
  .then(res=>res.json())
  .then(data=>{
    if(data.status==="registered") alert("Registered ✅");
    else if(data.status==="exists") alert("User exists ❌");
  });
}

</script>

</body>
</html>
