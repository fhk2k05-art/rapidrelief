<!DOCTYPE html>
<html>
<head>
<title>RapidRelief Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Inter',sans-serif;
}

body {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:
    linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
    url("https://images.unsplash.com/photo-1584433144859-1fc3ab64a957") center/cover;
}

.box {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
  padding:40px;
  border-radius:20px;
  width:340px;
  text-align:center;
  color:white;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
  border:1px solid rgba(255,255,255,0.1);
}

.logo {
  width:80px;
  margin-bottom:10px;
}

input {
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:10px;
}

button {
  width:100%;
  padding:12px;
  margin:6px 0;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
  transition:0.3s;
}

button:hover {
  transform:scale(1.05);
}

.login { background:#00c6ff; color:white; }
.register { background:#28a745; color:white; }
.face { background:orange; color:black; }

video {
  margin-top:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="box">

  <img src="logo.png" class="logo">
  <h2>🚑 RapidRelief</h2>

  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">

  <button class="login" onclick="login()">Login</button>
  <button class="register" onclick="register()">Register</button>

  <hr>

  <h3>Face Login</h3>
  <video id="video" width="250" height="200" autoplay muted></video>

  <button class="face" onclick="faceRegister()">Register Face</button>
  <button class="face" onclick="faceLogin()">Use Face</button>

</div>

<script>
const video = document.getElementById("video");

navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => video.srcObject = stream)
.catch(()=>alert("Camera permission denied"));

function login(){
  const username = usernameInput.value;
  const password = passwordInput.value;

  fetch("/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username,password})
  })
  .then(res=>res.json())
  .then(data=>{
    if(data.status==="user" || data.status==="admin"){
      window.location.href="/dashboard";
    } else {
      alert("Login failed ❌");
    }
  });
}

function register(){
  const username = usernameInput.value;
  const password = passwordInput.value;

  fetch("/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username,password})
  })
  .then(()=>alert("Registered ✅"));
}

function faceRegister(){
  localStorage.setItem("faceRegistered","true");
  alert("Face Registered ✅");
}

function faceLogin(){
  if(!localStorage.getItem("faceRegistered")){
    alert("Register face first ❌");
    return;
  }

  alert("Scanning face... 👁️");

  fetch("/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({username:usernameInput.value, face:true})
  })
  .then(res=>res.json())
  .then(data=>{
    if(data.status==="user" || data.status==="admin"){
      window.location.href="/dashboard";
    } else {
      alert("Face login failed ❌");
    }
  });
}
</script>

</body>
</html>
