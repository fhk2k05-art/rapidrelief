<!DOCTYPE html>
<html>
<head>
<title>RapidRelief Login</title>

<style>

/* 🔥 DARK PREMIUM BACKGROUND */
body {
  margin:0;
  font-family:Segoe UI;
  background:linear-gradient(rgba(0,0,0,0.85),rgba(0,0,0,0.9)),
  url("https://images.unsplash.com/photo-1492724441997-5dc865305da7") no-repeat center/cover;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* GLASS CARD */
.container {
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(15px);
  padding:30px;
  border-radius:20px;
  width:320px;
  text-align:center;
  color:white;
}

/* LOGO */
.login-logo{
  width:220px;
  margin-bottom:20px;
}

/* INPUT */
input {
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:10px;
}

/* BUTTON ROW */
.btn-row {
  display:flex;
  gap:10px;
}

/* BUTTONS */
button {
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  color:white;
}

.login-btn { background:#0ea5e9; }
.register-btn { background:#16a34a; }

/* FACE */
.face-box {
  margin-top:20px;
}

video {
  width:100%;
  border-radius:10px;
  display:none;
}

.face-btn {
  margin-top:10px;
  background:#f59e0b;
  width:100%;
}

</style>

</head>

<body>

<div class="container">

  <!-- ✅ LOGO -->
  <img src="logo.png" class="login-logo">

  <!-- ✅ IMPORTANT: SAME IDS USED IN JS -->
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <div class="btn-row">
    <button class="login-btn" onclick="login()">Login</button>
    <button class="register-btn" onclick="register()">Register</button>
  </div>

  <hr>

  <h3>Face Login</h3>

  <div class="face-box">
    <video id="video" autoplay playsinline></video>
    <button class="face-btn" onclick="openCamera()">Use Face</button>
  </div>

</div>

<script>

let stream;

/* CAMERA */
function openCamera(){
  navigator.mediaDevices.getUserMedia({video:true})
  .then(s=>{
    stream=s;
    const video=document.getElementById("video");
    video.srcObject=stream;
    video.style.display="block";
  })
  .catch(()=>alert("Camera denied ❌"));
}

/* ✅ LOGIN FIXED */
function login(){

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  console.log("LOGIN DATA:", email, password);

  if(!email || !password){
    alert("Please fill all fields ❌");
    return;
  }

  fetch("/login",{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({ email, password })
  })
  .then(res=>res.json())
  .then(data=>{
    console.log(data);

    if(data.status==="success"){
      window.location="rr.html";
    } else {
      alert(data.message || "Login failed ❌");
    }
  })
  .catch(err=>{
    console.error(err);
    alert("Server error ❌");
  });
}

/* ✅ REGISTER FIXED */
function register(){

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  console.log("REGISTER DATA:", email, password);

  if(!email || !password){
    alert("Fill all fields ❌");
    return;
  }

  fetch("/register",{
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body:JSON.stringify({ email, password })
  })
  .then(res=>res.json())
  .then(data=>{
    console.log(data);
    alert(data.message || "Registered");
  })
  .catch(err=>{
    console.error(err);
    alert("Server error ❌");
  });
}

</script>

</body>
</html>
