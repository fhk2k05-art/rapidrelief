<!DOCTYPE html>
<html>
<head>
<title>RapidRelief Login</title>

<style>

/* 🌌 BACKGROUND */
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;

  background:
  linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.8)),
  url("https://images.unsplash.com/photo-1584433144859-1fc3ab64a957");

  background-size:cover;
  color:white;
}

/* 🧊 GLASS CARD */
.container{
  width:350px;
  padding:30px;
  border-radius:20px;

  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);

  box-shadow:0 0 40px rgba(0,0,0,0.5);
  text-align:center;
}

/* 🏷 TITLE */
h2{
  margin-bottom:20px;
}

/* INPUTS */
input{
  width:90%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:10px;
  outline:none;
}

/* BUTTONS */
button{
  width:95%;
  padding:12px;
  margin:8px 0;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-size:14px;
  transition:0.3s;
}

/* PRIMARY */
.primary{
  background:#00c6ff;
  color:white;
}

/* SECONDARY */
.secondary{
  background:#333;
  color:white;
}

/* FACE BUTTON */
.face{
  background:green;
  color:white;
}

/* HOVER EFFECT */
button:hover{
  transform:scale(1.05);
}

/* DIVIDER */
hr{
  margin:20px 0;
  border:0;
  height:1px;
  background:rgba(255,255,255,0.2);
}

</style>
</head>

<body>

<div class="container">

<h2>🚑 RapidRelief</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button class="primary" onclick="login()">Login</button>
<button class="secondary" onclick="register()">Register</button>

<hr>

<button class="face" onclick="registerFace()">📸 Register Face</button>
<button class="face" onclick="loginFace()">😎 Face Login</button>

</div>

<script>

/* 📸 CAPTURE FACE */
async function captureFace(){
  const stream = await navigator.mediaDevices.getUserMedia({video:true});
  const video = document.createElement("video");

  video.srcObject = stream;
  await video.play();

  const canvas = document.createElement("canvas");
  canvas.width = 200;
  canvas.height = 150;

  canvas.getContext("2d").drawImage(video,0,0);

  stream.getTracks().forEach(t=>t.stop());

  return canvas.toDataURL();
}

/* 🔐 LOGIN */
function login(){
  fetch("/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      username:username.value,
      password:password.value
    })
  })
  .then(res=>res.json())
  .then(handleLogin);
}

/* 📝 REGISTER */
function register(){
  fetch("/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      username:username.value,
      password:password.value
    })
  })
  .then(res=>res.json())
  .then(data=>alert(data.status));
}

/* 📸 FACE REGISTER */
async function registerFace(){
  const face = await captureFace();

  fetch("/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      username:username.value,
      password:password.value,
      face
    })
  })
  .then(res=>res.json())
  .then(()=>alert("Face Registered ✅"));
}

/* 😎 FACE LOGIN */
async function loginFace(){
  const face = await captureFace();

  fetch("/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({face})
  })
  .then(res=>res.json())
  .then(handleLogin);
}

/* 🔄 HANDLE LOGIN */
function handleLogin(data){

  if(data.status==="admin"){
    window.location="/admin";
  }
  else if(data.status==="user"){
    window.location="/dashboard";
  }
  else{
    alert("Login failed ❌");
  }
}

</script>

</body>
</html>
