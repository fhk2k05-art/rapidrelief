<!DOCTYPE html>
<html>
<head>
<title>RapidRelief Admin Ultimate</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

/* 🌈 BACKGROUND */
body {
  margin:0;
  font-family:'Segoe UI',sans-serif;
  color:white;
  overflow:hidden;

  background: linear-gradient(-45deg,#0f172a,#1e293b,#020617,#111827);
  background-size:400% 400%;
  animation: bgMove 10s infinite alternate;
}

@keyframes bgMove {
  0% {background-position:0%}
  100% {background-position:100%}
}

/* 🔝 NAV */
.nav {
  display:flex;
  justify-content:space-between;
  padding:15px 25px;
  backdrop-filter:blur(15px);
  background:rgba(255,255,255,0.05);
}

.title { font-size:22px; font-weight:bold; }

/* 📊 STATS */
.stats {
  display:flex;
  gap:15px;
  padding:15px;
}

.box {
  flex:1;
  padding:20px;
  border-radius:15px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);
  text-align:center;
  transition:0.3s;
}

.box:hover {
  transform:scale(1.05);
}

/* 🔘 BUTTONS */
.actions {
  padding:10px 15px;
}

.actions button {
  margin:5px;
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:#00c6ff;
  color:white;
  cursor:pointer;
  transition:0.3s;
}

.actions button:hover {
  transform:scale(1.1);
}

/* 📦 MAIN */
.container {
  display:flex;
  height:calc(100vh - 140px);
}

/* 📋 LIST */
.list {
  width:35%;
  overflow:auto;
  padding:10px;
}

/* 🗺 MAP */
#map {
  width:65%;
  height:100%;
  border-radius:20px;
}

/* 🧾 CARD */
.card {
  margin:10px;
  padding:12px;
  border-radius:12px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);
  transition:0.3s;
}

.card:hover {
  transform:translateX(5px);
}

/* 🚨 SOS PULSE */
.pulse {
  animation:pulse 1s infinite;
}

@keyframes pulse {
  0% {box-shadow:0 0 0 0 red;}
  100% {box-shadow:0 0 20px 10px transparent;}
}

/* 🔔 NOTIFICATION */
.notify {
  position:fixed;
  top:20px;
  right:20px;
  background:red;
  padding:15px;
  border-radius:10px;
  display:none;
}

</style>
</head>

<body>

<div class="nav">
  <div class="title">🚨 RapidRelief Ultimate</div>
  <div>🟢 Live Monitoring</div>
</div>

<div class="stats">
  <div class="box">🚑 <br> <span id="med">0</span></div>
  <div class="box">🔥 <br> <span id="fire">0</span></div>
  <div class="box">🚓 <br> <span id="crime">0</span></div>
</div>

<div class="actions">
  <button onclick="loadSOS()">🚨 SOS</button>
  <button onclick="loadTrack()">📍 Tracking</button>
  <button onclick="loadUsers()">👤 Users</button>
</div>

<div class="container">
  <div class="list" id="list"></div>
  <div id="map"></div>
</div>

<div class="notify" id="notify">🚨 NEW SOS ALERT!</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

let map = L.map('map').setView([10.8505,76.2711],7);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

let markers=[];
let lastCount=0;

/* 🔔 ALERT SOUND */
function playSound(){
  new Audio("https://www.soundjay.com/button/beep-07.wav").play();
}

/* 🔔 SHOW NOTIFICATION */
function showNotify(){
  let n=document.getElementById("notify");
  n.style.display="block";
  setTimeout(()=>n.style.display="none",3000);
}

/* 🚨 SOS */
function loadSOS(){

  fetch("/admin/sos")
  .then(res=>res.json())
  .then(data=>{

    if(data.length > lastCount){
      playSound();
      showNotify();
    }

    lastCount = data.length;

    markers.forEach(m=>map.removeLayer(m));
    markers=[];

    let html="";
    let med=0,fire=0,crime=0;

    data.slice().reverse().forEach(s=>{

      if(s.type==="Medical") med++;
      if(s.type==="Fire") fire++;
      if(s.type==="Crime") crime++;

      html+=`
      <div class="card pulse">
        🚨 ${s.type}<br>
        📍 ${s.lat}, ${s.lon}<br>
        🕒 ${s.time}
      </div>`;

      let m=L.marker([s.lat,s.lon]).addTo(map);
      markers.push(m);
    });

    document.getElementById("list").innerHTML=html;
    document.getElementById("med").innerText=med;
    document.getElementById("fire").innerText=fire;
    document.getElementById("crime").innerText=crime;

  });
}

/* 📍 TRACK */
function loadTrack(){

  fetch("/admin/track")
  .then(res=>res.json())
  .then(data=>{

    markers.forEach(m=>map.removeLayer(m));
    markers=[];

    data.slice(-20).forEach(t=>{
      let m=L.marker([t.lat,t.lon]).addTo(map);
      markers.push(m);
    });

  });
}

/* 👤 USERS */
function loadUsers(){

  fetch("/admin/users")
  .then(res=>res.json())
  .then(data=>{

    let html="";

    data.forEach(u=>{
      html+=`
      <div class="card">
        👤 ${u.username}<br>
        🕒 ${u.time}
      </div>`;
    });

    document.getElementById("list").innerHTML=html;
  });
}

/* 🔄 AUTO */
setInterval(loadSOS,3000);
loadSOS();

</script>

</body>
</html>
