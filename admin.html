<!DOCTYPE html>
<html>
<head>
<title>RapidRelief Control System</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ===== GLOBAL ===== */
body{
  margin:0;
  font-family: "Segoe UI", sans-serif;
  display:flex;
  background:#020617;
  color:#e2e8f0;
}

/* ===== SIDEBAR ===== */
.sidebar{
  width:230px;
  padding:20px;
  background:#020617;
  border-right:1px solid rgba(56,189,248,0.2);
}

.sidebar h2{
  text-align:center;
  color:#38bdf8;
  letter-spacing:1px;
}

.sidebar button{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:10px;
  background:#0f172a;
  color:#cbd5e1;
  cursor:pointer;
  transition:0.3s;
}

.sidebar button:hover{
  background:#38bdf8;
  color:#020617;
}

/* ===== MAIN ===== */
.main{
  flex:1;
  padding:20px;
}

/* TOPBAR */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.live-dot{
  color:#22c55e;
  font-weight:bold;
}

.logout{
  background:#ef4444;
  padding:10px;
  border:none;
  color:white;
  border-radius:8px;
}

/* ===== CARDS ===== */
.cards{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
  margin-top:20px;
}

.card{
  background:#0f172a;
  padding:20px;
  border-radius:14px;
  text-align:center;
  border:1px solid rgba(56,189,248,0.1);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-4px);
  box-shadow:0 0 20px rgba(56,189,248,0.2);
}

/* ===== CHART ===== */
.chart-box{
  background:#0f172a;
  padding:20px;
  border-radius:14px;
  margin-top:20px;
  border:1px solid rgba(56,189,248,0.1);
}

/* ===== TABLE ===== */
table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
  background:#0f172a;
  border-radius:12px;
  overflow:hidden;
}

th{
  background:#020617;
  color:#64748b;
  padding:12px;
}

td{
  padding:12px;
  border-bottom:1px solid rgba(255,255,255,0.05);
}

tr:hover{
  background:#1e293b;
}

/* ALERT */
.alert{
  background:rgba(239,68,68,0.2);
}

/* NAV BUTTON */
.nav-btn{
  padding:6px 10px;
  background:#22c55e;
  border:none;
  border-radius:6px;
  color:white;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="sidebar">
  <h2>⚡ CONTROL</h2>
  <button onclick="loadUsers()">Users</button>
  <button onclick="loadSOS()">SOS</button>
  <button onclick="loadTrack()">Tracking</button>
  <button onclick="loadCategory()">Category</button>
</div>

<div class="main">

  <div class="topbar">
    <h1>🧠 Control Core</h1>
    <div class="live-dot">● LIVE</div>
    <button class="logout" onclick="logout()">Logout</button>
  </div>

  <!-- STATS -->
  <div class="cards">
    <div class="card"><h3 id="u">0</h3><p>Users</p></div>
    <div class="card"><h3 id="s">0</h3><p style="color:#ef4444;">SOS</p></div>
    <div class="card"><h3 id="t">0</h3><p>Tracking</p></div>
    <div class="card"><h3 id="c">0</h3><p>Category</p></div>
  </div>

  <!-- CHART -->
  <div class="chart-box">
    <canvas id="chart"></canvas>
  </div>

  <!-- TABLE -->
  <table id="table">
    <thead>
      <tr>
        <th>User</th>
        <th>Lat</th>
        <th>Lon</th>
        <th>Time</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

</div>

<script>

let chart;

function openMap(lat,lon){
  window.open(`https://www.google.com/maps?q=${lat},${lon}`);
}

function updateChart(u,s,t,c){
  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type:"doughnut",
    data:{
      labels:["Users","SOS","Tracking","Category"],
      datasets:[{
        data:[u,s,t,c],
        backgroundColor:[
          "#38bdf8","#ef4444","#22c55e","#f59e0b"
        ]
      }]
    },
    options:{
      plugins:{
        legend:{ labels:{ color:"white" } }
      }
    }
  });
}

function render(data){

  const tbody=document.querySelector("#table tbody");
  tbody.innerHTML="";

  data.slice().reverse().forEach((d,i)=>{

    let lat=d.lat||"-";
    let lon=d.lon||"-";
    let user=d.user||"Unknown";
    let time=d.time||"-";

    let row=document.createElement("tr");

    if(i===0) row.classList.add("alert");

    row.innerHTML=`
      <td>${user}</td>
      <td>${lat}</td>
      <td>${lon}</td>
      <td>${time}</td>
      <td>
        ${lat!=="-"?`<button class="nav-btn" onclick="openMap(${lat},${lon})">📍 Go</button>`:"-"}
      </td>
    `;

    tbody.appendChild(row);
  });
}

function refreshAll(){

  Promise.all([
    fetch("/admin/users").then(r=>r.json()),
    fetch("/admin/sos").then(r=>r.json()),
    fetch("/admin/track").then(r=>r.json()),
    fetch("/admin/category").then(r=>r.json())
  ])
  .then(([u,s,t,c])=>{

    document.getElementById("u").innerText=u.length;
    document.getElementById("s").innerText=s.length;
    document.getElementById("t").innerText=t.length;
    document.getElementById("c").innerText=c.length;

    updateChart(u.length,s.length,t.length,c.length);
    render([...s,...t]);
  });
}

function loadUsers(){ fetch("/admin/users").then(r=>r.json()).then(render); }
function loadSOS(){ fetch("/admin/sos").then(r=>r.json()).then(render); }
function loadTrack(){ fetch("/admin/track").then(r=>r.json()).then(render); }
function loadCategory(){ fetch("/admin/category").then(r=>r.json()).then(render); }

setInterval(refreshAll,5000);
refreshAll();

function logout(){
  window.location="/logout";
}

</script>

</body>
</html>
