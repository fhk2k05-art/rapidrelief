<!DOCTYPE html>
<html>
<head>
<title>RapidRelief Control System</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ===== GLOBAL ===== */
body{
  margin:0;
  font-family:"Orbitron", monospace;
  display:flex;
  background:black;
  color:#00ffff;
}

/* MATRIX */
#matrix{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-1;
}

/* ===== MOVING TEXT ===== */
.rr-overlay{
  position:fixed;
  top:-50px;
  left:-200px;
  font-size:28px;
  font-weight:bold;
  color:#ff0033;
  text-shadow:0 0 5px #ff0033,0 0 15px #ff0033,0 0 30px #ff0033;
  pointer-events:none;
  opacity:0.15;
  animation:moveRR 12s linear infinite;
}

@keyframes moveRR{
  0%{top:-50px;left:-200px;opacity:0;}
  10%{opacity:0.2;}
  50%{top:50%;left:50%;opacity:0.25;}
  100%{top:110%;left:110%;opacity:0;}
}

/* SIDEBAR */
.sidebar{
  width:230px;
  padding:20px;
  border-right:1px solid #00ffff;
}

.sidebar h2{
  text-align:center;
}

.sidebar button{
  width:100%;
  padding:12px;
  margin:10px 0;
  background:black;
  border:1px solid #00ffff;
  color:#00ffff;
}

/* MAIN */
.main{
  flex:1;
  padding:20px;
}

/* TOP */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.glitch{
  animation:glitch 1s infinite;
}

@keyframes glitch{
  0%{text-shadow:2px 0 red;}
  50%{text-shadow:-2px 0 blue;}
  100%{text-shadow:2px 0 red;}
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.card{
  border:1px solid #00ffff;
  padding:15px;
  text-align:center;
}

/* TABLE */
.table-container{
  overflow-x:auto;
}

table{
  width:100%;
  margin-top:20px;
}

td,th{
  border-bottom:1px solid #00ffff;
  padding:8px;
}

/* ALERT */
.alert{
  color:red;
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%{box-shadow:0 0 5px red;}
  50%{box-shadow:0 0 20px red;}
  100%{box-shadow:0 0 5px red;}
}

/* TERMINAL */
.terminal{
  margin-top:15px;
  border:1px solid #00ffff;
  padding:10px;
  height:100px;
  overflow:auto;
  color:#00ff9f;
}

/* BUTTON */
.nav-btn{
  background:#00ffff;
  border:none;
  padding:5px;
}

.logout{
  background:red;
  border:none;
  padding:8px;
  color:white;
}

/* MOBILE */
@media(max-width:768px){

  body{flex-direction:column;}

  .sidebar{
    width:100%;
    display:flex;
    overflow-x:auto;
    padding:10px;
  }

  .sidebar button{
    flex:1;
    margin:5px;
    font-size:12px;
    padding:8px;
  }

  .cards{
    grid-template-columns:1fr 1fr;
  }

  .topbar{
    flex-direction:column;
    align-items:flex-start;
  }

}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<!-- MOVING TEXT -->
<div class="rr-overlay">RAPID RELIEF</div>

<div class="sidebar">
  <h2>⚡ CORE</h2>
  <button onclick="setMode('all')">ALL</button>
  <button onclick="setMode('sos')">SOS</button>
  <button onclick="setMode('track')">TRACK</button>
  <button onclick="setMode('users')">USERS</button>
  <button onclick="setMode('category')">CATEGORY</button>
</div>

<div class="main">

  <div class="topbar">
    <h1 class="glitch">🧠 SYSTEM CORE</h1>
    <button class="logout" onclick="logout()">EXIT</button>
  </div>

  <div class="cards">
    <div class="card"><h3 id="u">0</h3><p>USERS</p></div>
    <div class="card"><h3 id="s">0</h3><p>SOS</p></div>
    <div class="card"><h3 id="t">0</h3><p>TRACK</p></div>
    <div class="card"><h3 id="c">0</h3><p>CATEGORY</p></div>
  </div>

  <canvas id="chart"></canvas>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>USER</th>
          <th>LAT</th>
          <th>LON</th>
          <th>TIME</th>
          <th>GO</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <div class="terminal" id="terminal"></div>

</div>

<script>

/* SAME WORKING LOGIC */

let chart,currentMode="all",ALL_DATA={};

function openMap(lat,lon){
  window.open(`https://www.google.com/maps?q=${lat},${lon}`);
}

function updateChart(u,s,t,c){
  if(chart) chart.destroy();
  chart=new Chart(document.getElementById("chart"),{
    type:"doughnut",
    data:{labels:["Users","SOS","Tracking","Category"],datasets:[{data:[u,s,t,c]}]}
  });
}

function render(data){
  const tbody=document.querySelector("tbody");
  tbody.innerHTML="";
  data.slice().reverse().forEach((d,i)=>{
    let row=document.createElement("tr");
    if(i===0) row.classList.add("alert");
    row.innerHTML=`
      <td>${d.user||"X"}</td>
      <td>${d.lat||"-"}</td>
      <td>${d.lon||"-"}</td>
      <td>${d.time||"-"}</td>
      <td>${d.lat?`<button onclick="openMap(${d.lat},${d.lon})">GO</button>`:"-"}</td>
    `;
    tbody.appendChild(row);
  });
}

function setMode(m){currentMode=m;applyMode();}
function applyMode(){
  let d;
  if(currentMode==="sos") d=ALL_DATA.s;
  else if(currentMode==="track") d=ALL_DATA.t;
  else if(currentMode==="users") d=ALL_DATA.u;
  else if(currentMode==="category") d=ALL_DATA.c;
  else d=[...ALL_DATA.s,...ALL_DATA.t];
  render(d);
}

function loadAll(){
  Promise.all([
    fetch("/admin/users").then(r=>r.json()),
    fetch("/admin/sos").then(r=>r.json()),
    fetch("/admin/track").then(r=>r.json()),
    fetch("/admin/category").then(r=>r.json())
  ])
  .then(([u,s,t,c])=>{
    ALL_DATA={u,s,t,c};
    document.getElementById("u").innerText=u.length;
    document.getElementById("s").innerText=s.length;
    document.getElementById("t").innerText=t.length;
    document.getElementById("c").innerText=c.length;
    updateChart(u.length,s.length,t.length,c.length);
    applyMode();
  });
}

const live=new EventSource("/live");
live.onmessage=(e)=>{
  const msg=JSON.parse(e.data);
  const d=msg.data;
  if(msg.type==="sos") ALL_DATA.s.push(d);
  if(msg.type==="track") ALL_DATA.t.push(d);
  applyMode();
};

setInterval(loadAll,5000);
loadAll();

function logout(){window.location="/logout";}

/* MATRIX */
const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");
canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

let drops=[];
for(let i=0;i<canvas.width/10;i++) drops[i]=1;

function draw(){
  ctx.fillStyle="rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="#0f0";
  drops.forEach((y,i)=>{
    ctx.fillText("1",i*10,y*10);
    drops[i]=y>100?0:y+1;
  });
}
setInterval(draw,33);

</script>

</body>
</html>
