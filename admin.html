<!DOCTYPE html>
<html>
<head>
<title>RapidRelief Admin PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body {
  margin:0;
  font-family:'Segoe UI';
  display:flex;
  background:#0f172a;
  color:white;
}

.sidebar {
  width:220px;
  background:#020617;
  padding:20px;
}

.sidebar button {
  width:100%;
  margin:10px 0;
  padding:10px;
  background:#1e293b;
  color:white;
  border:none;
}

.main {
  flex:1;
  padding:20px;
}

.content {
  display:flex;
}

.list {
  width:40%;
  height:500px;
  overflow:auto;
}

#map {
  width:60%;
  height:500px;
}

.card {
  margin:10px;
  padding:10px;
  background:#1e293b;
}
</style>
</head>

<body>

<div class="sidebar">
  <button onclick="loadSOS()">SOS</button>
  <button onclick="loadTrack()">Live Tracking</button>
  <button onclick="loadUsers()">Users</button>
</div>

<div class="main">
  <h2>Admin Dashboard</h2>

  <div class="content">
    <div class="list" id="list"></div>
    <div id="map"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

let map = L.map('map').setView([10.8505,76.2711], 7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let markers=[];

/* SOS */
function loadSOS(){
  fetch("/admin/sos")
  .then(res=>res.json())
  .then(data=>{
    let html="";
    data.slice().reverse().forEach(s=>{
      html+=`<div class="card">🚨 ${s.type}<br>${s.lat},${s.lon}</div>`;
    });
    document.getElementById("list").innerHTML=html;
  });
}

/* TRACK */
function loadTrack(){

  fetch("/admin/track")
  .then(res=>res.json())
  .then(data=>{

    markers.forEach(m=>map.removeLayer(m));
    markers=[];

    let html="";

    data.slice(-20).forEach(t=>{

      html+=`<div class="card">📍 ${t.lat},${t.lon}</div>`;

      let marker=L.marker([t.lat,t.lon]).addTo(map);
      markers.push(marker);
    });

    document.getElementById("list").innerHTML=html;

    let last=data[data.length-1];
    if(last) map.setView([last.lat,last.lon],15);
  });
}

/* USERS */
function loadUsers(){
  fetch("/admin/users")
  .then(res=>res.json())
  .then(data=>{
    let html="";
    data.forEach(u=>{
      html+=`<div class="card">👤 ${u.username}</div>`;
    });
    document.getElementById("list").innerHTML=html;
  });
}

/* AUTO TRACK */
setInterval(loadTrack,5000);

</script>

</body>
</html>
