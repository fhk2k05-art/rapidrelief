<!DOCTYPE html>
<html>
<head>
<title>RapidRelief Admin</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* 🌌 BASE */
body{
  margin:0;
  font-family:Segoe UI;
  display:flex;
  background:#020617;
  color:white;
}

/* SIDEBAR */
.sidebar{
  width:230px;
  background:#020617;
  border-right:1px solid rgba(255,255,255,0.05);
  padding:20px;
}

.sidebar h2{
  text-align:center;
  color:#38bdf8;
}

.sidebar button{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:10px;
  background:rgba(255,255,255,0.05);
  color:white;
  cursor:pointer;
  transition:0.3s;
}

.sidebar button:hover{
  background:#0ea5e9;
  transform:translateX(5px);
}

/* MAIN */
.main{
  flex:1;
  padding:20px;
}

/* TOP */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logout{
  background:#ef4444;
  border:none;
  padding:10px;
  border-radius:8px;
  color:white;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
  margin-top:20px;
}

.card{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  padding:20px;
  border-radius:15px;
  text-align:center;

  box-shadow:0 0 20px rgba(14,165,233,0.15);
}

/* CHART */
.chart-box{
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:15px;
  margin-top:20px;
  text-align:center;
}

/* TABLE */
table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
}

th,td{
  padding:12px;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

/* MOBILE */
@media(max-width:768px){
  .cards{
    grid-template-columns:1fr 1fr;
  }
  .sidebar{
    display:none;
  }
}

</style>
</head>

<body>

<div class="sidebar">
  <h2>⚡ Admin</h2>
  <button onclick="loadUsers()">Users</button>
  <button onclick="loadSOS()">SOS</button>
  <button onclick="loadTrack()">Tracking</button>
  <button onclick="loadCategory()">Category</button>
</div>

<div class="main">

  <div class="top">
    <h1>🚀 Dashboard</h1>
    <button class="logout" onclick="logout()">Logout</button>
  </div>

  <!-- CARDS -->
  <div class="cards">
    <div class="card"><h3 id="u">0</h3><p>Users</p></div>
    <div class="card"><h3 id="s">0</h3><p>SOS</p></div>
    <div class="card"><h3 id="t">0</h3><p>Tracking</p></div>
    <div class="card"><h3 id="c">0</h3><p>Category</p></div>
  </div>

  <!-- DONUT CHART -->
  <div class="chart-box">
    <canvas id="chart" width="200"></canvas>
  </div>

  <!-- TABLE -->
  <table id="table">
    <thead><tr><th>Data</th></tr></thead>
    <tbody></tbody>
  </table>

</div>

<script>

let chart;

/* DONUT CHART */
function updateChart(u,s,t,c){

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type:"doughnut",
    data:{
      labels:["Users","SOS","Tracking","Category"],
      datasets:[{
        data:[u,s,t,c],
        backgroundColor:[
          "#38bdf8",
          "#ef4444",
          "#22c55e",
          "#f59e0b"
        ]
      }]
    },
    options:{
      plugins:{
        legend:{ labels:{ color:"white" } }
      }
    }
  });
}

/* RENDER */
function render(data){
  const tbody=document.querySelector("#table tbody");
  tbody.innerHTML="";
  data.forEach(d=>{
    let row=document.createElement("tr");
    row.innerHTML=`<td>${JSON.stringify(d)}</td>`;
    tbody.appendChild(row);
  });
}

/* LOAD FUNCTIONS */
function loadUsers(){
  fetch("/admin/users").then(r=>r.json()).then(d=>{
    document.getElementById("u").innerText=d.length;
    render(d);
  });
}

function loadSOS(){
  fetch("/admin/sos").then(r=>r.json()).then(d=>{
    document.getElementById("s").innerText=d.length;
    render(d);
  });
}

function loadTrack(){
  fetch("/admin/track").then(r=>r.json()).then(d=>{
    document.getElementById("t").innerText=d.length;
    render(d);
  });
}

function loadCategory(){
  fetch("/admin/category").then(r=>r.json()).then(d=>{
    document.getElementById("c").innerText=d.length;
    render(d);
  });
}

/* LOGOUT */
function logout(){
  window.location="/logout";
}

/* INITIAL LOAD */
Promise.all([
  fetch("/admin/users").then(r=>r.json()),
  fetch("/admin/sos").then(r=>r.json()),
  fetch("/admin/track").then(r=>r.json()),
  fetch("/admin/category").then(r=>r.json())
]).then(([u,s,t,c])=>{
  document.getElementById("u").innerText=u.length;
  document.getElementById("s").innerText=s.length;
  document.getElementById("t").innerText=t.length;
  document.getElementById("c").innerText=c.length;

  updateChart(u.length,s.length,t.length,c.length);
});

</script>

</body>
</html>
