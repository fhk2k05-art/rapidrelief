<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body { font-family: Arial; background:#111; color:white; display:flex; }

.sidebar {
  width:200px;
  background:#000;
  padding:20px;
}

.sidebar button {
  width:100%;
  margin:10px 0;
  padding:10px;
}

.main {
  flex:1;
  padding:20px;
}

#map {
  height:400px;
}

.card {
  background:#222;
  margin:10px;
  padding:10px;
}
</style>
</head>

<body>

<div class="sidebar">
  <button onclick="loadSOS()">SOS</button>
  <button onclick="loadTrack()">Tracking</button>
  <button onclick="loadUsers()">Users</button>
</div>

<div class="main">
  <h2>Admin Panel</h2>

  <div id="list"></div>
  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

let map = L.map('map').setView([10.85,76.27], 7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let markers=[];

/* SOS */
function loadSOS(){
  fetch("/admin/sos")
  .then(res=>res.json())
  .then(data=>{
    let html="";
    data.forEach(s=>{
      html += `<div class="card">🚨 ${s.type}<br>${s.lat},${s.lon}</div>`;
    });
    document.getElementById("list").innerHTML = html;
  });
}

/* TRACK */
function loadTrack(){
  fetch("/admin/track")
  .then(res=>res.json())
  .then(data=>{

    markers.forEach(m=>map.removeLayer(m));
    markers=[];

    let html="";

    data.forEach(t=>{
      html += `<div class="card">📍 ${t.lat},${t.lon}</div>`;

      let m = L.marker([t.lat,t.lon]).addTo(map);
      markers.push(m);
    });

    document.getElementById("list").innerHTML = html;

    if(data.length){
      let last = data[data.length-1];
      map.setView([last.lat,last.lon],15);
    }

  });
}

/* USERS */
function loadUsers(){
  fetch("/admin/users")
  .then(res=>res.json())
  .then(data=>{
    let html="";
    data.forEach(u=>{
      html += `<div class="card">👤 ${u.username}</div>`;
    });
    document.getElementById("list").innerHTML = html;
  });
}

/* AUTO TRACK */
setInterval(loadTrack,5000);

</script>

</body>
</html>
