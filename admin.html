<!DOCTYPE html>
<html>
<head>
<title>RapidRelief // CORE TERMINAL</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

/* MATRIX BACKGROUND */
canvas#matrix {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
}

/* GLOBAL */
body{
  margin:0;
  font-family:"Courier New", monospace;
  color:#00ff9f;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  padding:20px;
  background:rgba(0,0,0,0.9);
  border-right:1px solid #00ff9f;
}

.sidebar h2{
  text-align:center;
  text-shadow:0 0 10px #00ff9f;
}

.sidebar button{
  width:100%;
  margin:10px 0;
  padding:10px;
  background:black;
  border:1px solid #00ff9f;
  color:#00ff9f;
  cursor:pointer;
}

.sidebar button:hover{
  background:#00ff9f;
  color:black;
}

/* MAIN */
.main{
  flex:1;
  padding:20px;
}

/* GLITCH TITLE */
.glitch{
  font-size:24px;
  animation:glitch 1s infinite;
}

@keyframes glitch{
  0%{text-shadow:2px 0 red;}
  50%{text-shadow:-2px 0 blue;}
  100%{text-shadow:2px 0 red;}
}

/* LIVE TEXT */
.live{
  animation:blink 1s infinite;
}
@keyframes blink{50%{opacity:0;}}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.card{
  border:1px solid #00ff9f;
  padding:15px;
  text-align:center;
  box-shadow:0 0 10px #00ff9f;
}

/* RADAR */
.radar{
  width:200px;
  height:200px;
  border-radius:50%;
  border:2px solid #00ff9f;
  margin:20px auto;
  position:relative;
  overflow:hidden;
}

.radar::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background:conic-gradient(rgba(0,255,159,0.4), transparent);
  animation:spin 2s linear infinite;
}

@keyframes spin{
  100%{transform:rotate(360deg);}
}

/* MAP */
#adminMap{
  height:250px;
  margin-top:20px;
  border:1px solid #00ff9f;
}

/* TABLE */
table{
  width:100%;
  margin-top:20px;
}

td,th{
  border-bottom:1px solid #00ff9f;
  padding:8px;
}

/* ALERT */
.alert{
  color:red;
  animation:blink 0.5s infinite;
}

/* TERMINAL */
.terminal{
  background:black;
  border:1px solid #00ff9f;
  padding:10px;
  margin-top:20px;
  height:120px;
  overflow:auto;
  font-size:12px;
}

/* BUTTON */
.nav-btn{
  background:#00ff9f;
  border:none;
  padding:5px;
  cursor:pointer;
}

.logout{
  background:red;
  border:none;
  padding:10px;
  color:white;
}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="sidebar">
  <h2>⚡ CORE</h2>
  <button onclick="loadUsers()">Users</button>
  <button onclick="loadSOS()">SOS</button>
  <button onclick="loadTrack()">Tracking</button>
  <button onclick="loadCategory()">Category</button>
</div>

<div class="main">

  <div style="display:flex;justify-content:space-between;">
    <h1 class="glitch">🧠 SYSTEM CORE</h1>
    <div class="live">● ONLINE</div>
    <button class="logout" onclick="logout()">EXIT</button>
  </div>

  <div class="cards">
    <div class="card"><h2 id="u">0</h2><p>USERS</p></div>
    <div class="card"><h2 id="s">0</h2><p style="color:red;">SOS</p></div>
    <div class="card"><h2 id="t">0</h2><p>TRACK</p></div>
    <div class="card"><h2 id="c">0</h2><p>CATEGORY</p></div>
  </div>

  <div class="radar"></div>

  <div id="adminMap"></div>

  <table>
    <thead>
      <tr>
        <th>USER</th>
        <th>LAT</th>
        <th>LON</th>
        <th>TIME</th>
        <th>GO</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <div class="terminal" id="terminal"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* MATRIX RAIN */
const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

let letters="01";
letters=letters.split("");

let fontSize=14;
let columns=canvas.width/fontSize;

let drops=[];
for(let x=0;x<columns;x++) drops[x]=1;

function draw(){
  ctx.fillStyle="rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="#0f0";
  ctx.font=fontSize+"px monospace";

  for(let i=0;i<drops.length;i++){
    let text=letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text,i*fontSize,drops[i]*fontSize);

    if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
      drops[i]=0;

    drops[i]++;
  }
}
setInterval(draw,33);

/* MAP */
let map=L.map('adminMap').setView([10,76],7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

/* TERMINAL LOG */
function log(msg){
  let t=document.getElementById("terminal");
  t.innerHTML+=msg+"<br>";
  t.scrollTop=t.scrollHeight;
}

/* TABLE */
function render(data){
  const tbody=document.querySelector("tbody");
  tbody.innerHTML="";

  data.slice().reverse().forEach((d,i)=>{
    let row=document.createElement("tr");

    if(i===0) row.classList.add("alert");

    row.innerHTML=`
      <td>${d.user||"X"}</td>
      <td>${d.lat||"-"}</td>
      <td>${d.lon||"-"}</td>
      <td>${d.time||"-"}</td>
      <td>${d.lat?`<button class="nav-btn" onclick="openMap(${d.lat},${d.lon})">GO</button>`:"-"}</td>
    `;

    tbody.appendChild(row);
  });
}

/* MAP */
function plot(data){
  data.forEach(d=>{
    if(d.lat) L.marker([d.lat,d.lon]).addTo(map);
  });
}

function openMap(lat,lon){
  window.open(`https://maps.google.com?q=${lat},${lon}`);
}

/* LIVE */
function refreshAll(){

  Promise.all([
    fetch("/admin/users").then(r=>r.json()),
    fetch("/admin/sos").then(r=>r.json()),
    fetch("/admin/track").then(r=>r.json()),
    fetch("/admin/category").then(r=>r.json())
  ])
  .then(([u,s,t,c])=>{

    document.getElementById("u").innerText=u.length;
    document.getElementById("s").innerText=s.length;
    document.getElementById("t").innerText=t.length;
    document.getElementById("c").innerText=c.length;

    render([...s,...t]);
    plot([...s,...t]);

    log(">> SYSTEM UPDATE: "+new Date().toLocaleTimeString());

    if(s.length>0){
      new Audio("https://www.soundjay.com/button/beep-07.wav").play();
      log("🚨 ALERT DETECTED");
    }

  });
}

setInterval(refreshAll,3000);
refreshAll();

function logout(){
  window.location="/logout";
}

</script>

</body>
</html>
