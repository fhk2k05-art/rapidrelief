<!DOCTYPE html>
<html>
<head>
<title>RapidRelief // Control Core</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
  margin:0;
  font-family:"Courier New", monospace;
  background:#020617;
  color:#00ff9f;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:230px;
  padding:20px;
  border-right:1px solid #00ff9f;
}

.sidebar h2{
  text-align:center;
  text-shadow:0 0 10px #00ff9f;
}

.sidebar button{
  width:100%;
  padding:10px;
  margin:10px 0;
  background:transparent;
  border:1px solid #00ff9f;
  color:#00ff9f;
  cursor:pointer;
}

.sidebar button:hover{
  background:#00ff9f;
  color:black;
}

/* MAIN */
.main{
  flex:1;
  padding:20px;
}

/* TOP */
.topbar{
  display:flex;
  justify-content:space-between;
}

.live{
  animation:blink 1s infinite;
}

@keyframes blink{
  50%{opacity:0;}
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.card{
  border:1px solid #00ff9f;
  padding:15px;
  text-align:center;
}

/* MAP */
#map{
  height:300px;
  margin-top:20px;
  border:1px solid #00ff9f;
}

/* TABLE */
table{
  width:100%;
  margin-top:20px;
}

td,th{
  border-bottom:1px solid #00ff9f;
  padding:8px;
}

/* ALERT */
.alert{
  color:red;
  animation:blink 0.5s infinite;
}

/* TERMINAL */
.terminal{
  margin-top:15px;
  border:1px solid #00ff9f;
  padding:10px;
  height:120px;
  overflow:auto;
}

/* BUTTON */
.nav-btn{
  background:#00ff9f;
  border:none;
  padding:5px;
  cursor:pointer;
}

.logout{
  background:red;
  border:none;
  padding:10px;
  color:white;
}

</style>
</head>

<body>

<div class="sidebar">
  <h2>⚡ CORE</h2>
</div>

<div class="main">

  <div class="topbar">
    <h1>🧠 CONTROL CORE</h1>
    <div class="live">● LIVE</div>
    <button class="logout" onclick="logout()">EXIT</button>
  </div>

  <div class="cards">
    <div class="card"><h2 id="u">0</h2><p>USERS</p></div>
    <div class="card"><h2 id="s">0</h2><p style="color:red;">SOS</p></div>
    <div class="card"><h2 id="t">0</h2><p>TRACK</p></div>
    <div class="card"><h2 id="c">0</h2><p>CATEGORY</p></div>
  </div>

  <div id="map"></div>

  <table>
    <thead>
      <tr>
        <th>USER</th>
        <th>LAT</th>
        <th>LON</th>
        <th>TIME</th>
        <th>GO</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <div class="terminal" id="terminal"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* MAP */
let map = L.map('map').setView([10,76],7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let markers = {};

/* LOG */
function log(msg){
  let t = document.getElementById("terminal");
  t.innerHTML += msg + "<br>";
  t.scrollTop = t.scrollHeight;
}

/* MARKER */
function updateMarker(user, lat, lon){
  if(markers[user]){
    markers[user].setLatLng([lat,lon]);
  } else {
    markers[user] = L.marker([lat,lon]).addTo(map).bindPopup(user);
  }
}

/* TABLE */
function renderTable(data){

  const tbody = document.querySelector("tbody");
  tbody.innerHTML = "";

  data.slice().reverse().forEach((d,i)=>{

    let row = document.createElement("tr");

    if(i===0) row.classList.add("alert");

    row.innerHTML = `
      <td>${d.user||"Unknown"}</td>
      <td>${d.lat||"-"}</td>
      <td>${d.lon||"-"}</td>
      <td>${d.time||"-"}</td>
      <td>
        ${d.lat ? `<button class="nav-btn" onclick="openMap(${d.lat},${d.lon})">GO</button>` : "-"}
      </td>
    `;

    tbody.appendChild(row);

    if(d.lat){
      updateMarker(d.user,d.lat,d.lon);
    }
  });
}

/* NAV */
function openMap(lat,lon){
  window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}`);
}

/* LOAD OLD DATA */
function loadInitialData(){

  Promise.all([
    fetch("/admin/sos").then(r=>r.json()),
    fetch("/admin/track").then(r=>r.json())
  ])
  .then(([sos,track])=>{

    let combined = [...sos,...track];

    renderTable(combined);

    log("SYSTEM READY");
  });
}

/* REALTIME */
const live = new EventSource("/live");

live.onmessage = (e)=>{
  const msg = JSON.parse(e.data);

  updateMarker(msg.data.user,msg.data.lat,msg.data.lon);

  const tbody = document.querySelector("tbody");

  let row = document.createElement("tr");

  row.classList.add("alert");

  row.innerHTML = `
    <td>${msg.data.user}</td>
    <td>${msg.data.lat}</td>
    <td>${msg.data.lon}</td>
    <td>${msg.data.time}</td>
    <td><button class="nav-btn" onclick="openMap(${msg.data.lat},${msg.data.lon})">GO</button></td>
  `;

  tbody.prepend(row);

  if(msg.type==="sos"){
    log("🚨 SOS ALERT: "+msg.data.user);

    document.body.style.boxShadow="inset 0 0 80px red";
    setTimeout(()=>{document.body.style.boxShadow="none";},800);
  }

  if(msg.type==="track"){
    log("TRACK: "+msg.data.user);
  }
};

/* STATS */
function refreshStats(){
  Promise.all([
    fetch("/admin/users").then(r=>r.json()),
    fetch("/admin/sos").then(r=>r.json()),
    fetch("/admin/track").then(r=>r.json()),
    fetch("/admin/category").then(r=>r.json())
  ])
  .then(([u,s,t,c])=>{
    document.getElementById("u").innerText=u.length;
    document.getElementById("s").innerText=s.length;
    document.getElementById("t").innerText=t.length;
    document.getElementById("c").innerText=c.length;
  });
}

setInterval(refreshStats,3000);

/* INIT */
loadInitialData();
refreshStats();

function logout(){
  window.location="/logout";
}

</script>

</body>
</html>
