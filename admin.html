<!DOCTYPE html>
<html>
<head>
<title>RapidRelief Admin PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

/* ===== BODY ===== */
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  color:white;
  background:
    linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)),
    url("https://images.unsplash.com/photo-1504215680853-026ed2a45def");
  background-size:cover;
}

/* ===== NAVBAR ===== */
.nav {
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
  background:rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
}

.title {
  font-size:22px;
  font-weight:bold;
}

/* ===== STATS ===== */
.stats {
  display:flex;
  gap:15px;
  padding:20px;
}

.box {
  flex:1;
  padding:20px;
  border-radius:15px;
  background:rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  text-align:center;
  font-size:18px;
}

/* ===== BUTTONS ===== */
.actions {
  padding:0 20px;
}

.actions button {
  margin:5px;
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:#00c6ff;
  color:white;
  cursor:pointer;
}

/* ===== MAIN ===== */
.container {
  display:flex;
  padding:20px;
}

/* ===== LIST ===== */
.list {
  width:35%;
  height:500px;
  overflow:auto;
}

/* ===== MAP ===== */
#map {
  width:65%;
  height:500px;
  border-radius:15px;
}

/* ===== CARD ===== */
.card {
  background:rgba(255,255,255,0.1);
  margin:10px;
  padding:10px;
  border-radius:10px;
  backdrop-filter: blur(10px);
}

/* COLORS */
.medical { border-left:5px solid #3b82f6; }
.fire { border-left:5px solid #ef4444; }
.crime { border-left:5px solid #facc15; }

</style>
</head>

<body>

<div class="nav">
  <div class="title">🚨 RapidRelief Admin PRO</div>
  <div>Live Monitor</div>
</div>

<div class="stats">
  <div class="box">🚑 Medical: <span id="med">0</span></div>
  <div class="box">🔥 Fire: <span id="fire">0</span></div>
  <div class="box">🚓 Crime: <span id="crime">0</span></div>
</div>

<div class="actions">
  <button onclick="loadSOS()">🚨 SOS</button>
  <button onclick="loadTrack()">📍 Tracking</button>
  <button onclick="loadUsers()">👤 Users</button>
</div>

<div class="container">
  <div class="list" id="list"></div>
  <div id="map"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

let map = L.map('map').setView([10.8505,76.2711], 7);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
.addTo(map);

let markers=[];

/* ===== LOAD SOS ===== */
function loadSOS(){

  fetch("/admin/sos")
  .then(res=>res.json())
  .then(data=>{

    markers.forEach(m=>map.removeLayer(m));
    markers=[];

    let html="";
    let med=0, fire=0, crime=0;

    data.slice().reverse().forEach(s=>{

      if(s.type==="Medical") med++;
      if(s.type==="Fire") fire++;
      if(s.type==="Crime") crime++;

      let cls = s.type.toLowerCase();

      html += `
        <div class="card ${cls}">
          🚨 ${s.type}<br>
          📍 ${s.lat}, ${s.lon}<br>
          🕒 ${s.time}
        </div>
      `;

      let marker = L.marker([s.lat, s.lon]).addTo(map);
      markers.push(marker);
    });

    document.getElementById("list").innerHTML = html;
    document.getElementById("med").innerText = med;
    document.getElementById("fire").innerText = fire;
    document.getElementById("crime").innerText = crime;

  });
}

/* ===== TRACK ===== */
function loadTrack(){

  fetch("/admin/track")
  .then(res=>res.json())
  .then(data=>{

    markers.forEach(m=>map.removeLayer(m));
    markers=[];

    let html="";

    data.slice(-20).forEach(t=>{

      html += `
        <div class="card">
          📍 ${t.lat}, ${t.lon}<br>
          🕒 ${t.time}
        </div>
      `;

      let marker = L.marker([t.lat, t.lon]).addTo(map);
      markers.push(marker);
    });

    document.getElementById("list").innerHTML = html;

    let last = data[data.length-1];
    if(last) map.setView([last.lat,last.lon],15);

  });
}

/* ===== USERS ===== */
function loadUsers(){

  fetch("/admin/users")
  .then(res=>res.json())
  .then(data=>{

    let html="";

    data.forEach(u=>{
      html += `
        <div class="card">
          👤 ${u.username}<br>
          🕒 ${u.time}
        </div>
      `;
    });

    document.getElementById("list").innerHTML = html;
  });
}

/* AUTO REFRESH */
setInterval(loadSOS, 4000);

loadSOS();

</script>

</body>
</html>
