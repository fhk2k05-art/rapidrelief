<!DOCTYPE html>
<html>
<head>
<title>RapidRelief Control System</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ===== GLOBAL ===== */
body{
  margin:0;
  font-family:"Orbitron", monospace;
  display:flex;
  background:black;
  color:#00ffff;
  overflow:hidden;
}

/* MATRIX BACKGROUND */
#matrix{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
}

/* SIDEBAR */
.sidebar{
  width:230px;
  padding:20px;
  background:rgba(0,0,0,0.85);
  border-right:1px solid #00ffff;
}

.sidebar h2{
  text-align:center;
  text-shadow:0 0 10px #00ffff;
}

.sidebar button{
  width:100%;
  padding:12px;
  margin:10px 0;
  background:black;
  border:1px solid #00ffff;
  color:#00ffff;
  cursor:pointer;
}

.sidebar button:hover{
  background:#00ffff;
  color:black;
}

/* MAIN */
.main{
  flex:1;
  padding:20px;
}

/* GLITCH TITLE */
.glitch{
  font-size:26px;
  animation:glitch 1s infinite;
}

@keyframes glitch{
  0%{text-shadow:2px 0 red;}
  50%{text-shadow:-2px 0 blue;}
  100%{text-shadow:2px 0 red;}
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-top:20px;
}

.card{
  border:1px solid #00ffff;
  padding:15px;
  text-align:center;
  box-shadow:0 0 10px #00ffff;
}

/* CHART */
.chart-box{
  margin-top:20px;
  border:1px solid #00ffff;
  padding:20px;
}

/* TABLE */
table{
  width:100%;
  margin-top:20px;
}

td,th{
  border-bottom:1px solid #00ffff;
  padding:10px;
}

/* ALERT */
@keyframes pulse{
  0%{box-shadow:0 0 5px red;}
  50%{box-shadow:0 0 25px red;}
  100%{box-shadow:0 0 5px red;}
}

.alert{
  color:red;
  animation:pulse 1s infinite;
}

/* BUTTON */
.nav-btn{
  background:#00ffff;
  border:none;
  padding:6px;
  cursor:pointer;
}

/* TERMINAL */
.terminal{
  margin-top:15px;
  border:1px solid #00ffff;
  padding:10px;
  height:100px;
  overflow:auto;
  font-size:12px;
  color:#00ff9f;
}

.logout{
  background:red;
  border:none;
  padding:10px;
  color:white;
}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="sidebar">
  <h2>⚡ CORE</h2>
  <button onclick="loadUsers()">Users</button>
  <button onclick="loadSOS()">SOS</button>
  <button onclick="loadTrack()">Tracking</button>
  <button onclick="loadCategory()">Category</button>
</div>

<div class="main">

  <div style="display:flex;justify-content:space-between;">
    <h1 class="glitch">🧠 SYSTEM CORE</h1>
    <button class="logout" onclick="logout()">EXIT</button>
  </div>

  <div class="cards">
    <div class="card"><h3 id="u">0</h3><p>USERS</p></div>
    <div class="card"><h3 id="s">0</h3><p>SOS</p></div>
    <div class="card"><h3 id="t">0</h3><p>TRACK</p></div>
    <div class="card"><h3 id="c">0</h3><p>CATEGORY</p></div>
  </div>

  <div class="chart-box">
    <canvas id="chart"></canvas>
  </div>

  <table id="table">
    <thead>
      <tr>
        <th>USER</th>
        <th>LAT</th>
        <th>LON</th>
        <th>TIME</th>
        <th>GO</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <div class="terminal" id="terminal"></div>

</div>

<script>

let chart;

/* MAP NAV */
function openMap(lat,lon){
  window.open(`https://www.google.com/maps?q=${lat},${lon}`);
}

/* CHART */
function updateChart(u,s,t,c){
  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type:"doughnut",
    data:{
      labels:["Users","SOS","Tracking","Category"],
      datasets:[{
        data:[u,s,t,c],
        backgroundColor:["#00ffff","red","#00ff9f","orange"]
      }]
    },
    options:{
      plugins:{legend:{labels:{color:"#00ffff"}}}
    }
  });
}

/* TABLE */
function render(data){

  const tbody=document.querySelector("#table tbody");
  tbody.innerHTML="";

  data.slice().reverse().forEach((d,i)=>{

    let row=document.createElement("tr");

    if(i===0) row.classList.add("alert");

    row.innerHTML=`
      <td>${d.user||"X"}</td>
      <td>${d.lat||"-"}</td>
      <td>${d.lon||"-"}</td>
      <td>${d.time||"-"}</td>
      <td>${d.lat?`<button class="nav-btn" onclick="openMap(${d.lat},${d.lon})">GO</button>`:"-"}</td>
    `;

    tbody.appendChild(row);
  });
}

/* REFRESH */
function refreshAll(){

  Promise.all([
    fetch("/admin/users").then(r=>r.json()),
    fetch("/admin/sos").then(r=>r.json()),
    fetch("/admin/track").then(r=>r.json()),
    fetch("/admin/category").then(r=>r.json())
  ])
  .then(([u,s,t,c])=>{

    document.getElementById("u").innerText=u.length;
    document.getElementById("s").innerText=s.length;
    document.getElementById("t").innerText=t.length;
    document.getElementById("c").innerText=c.length;

    updateChart(u.length,s.length,t.length,c.length);
    render([...s,...t]);

    log("SYSTEM SYNC");
  });
}

/* TERMINAL */
function log(msg){
  let t=document.getElementById("terminal");
  t.innerHTML+=msg+"<br>";
  t.scrollTop=t.scrollHeight;
}

/* AUTO */
setInterval(refreshAll,5000);
refreshAll();

/* MATRIX EFFECT */
const canvas=document.getElementById("matrix");
const ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

let letters="01";
letters=letters.split("");

let fontSize=14;
let columns=canvas.width/fontSize;

let drops=[];
for(let x=0;x<columns;x++) drops[x]=1;

function draw(){
  ctx.fillStyle="rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="#0f0";
  ctx.font=fontSize+"px monospace";

  for(let i=0;i<drops.length;i++){
    let text=letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text,i*fontSize,drops[i]*fontSize);

    if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
      drops[i]=0;

    drops[i]++;
  }
}

setInterval(draw,33);

function logout(){
  window.location="/logout";
}

</script>

</body>
</html>
