<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
  margin:0;
  font-family:Segoe UI;
  display:flex;
  background:#0f172a;
  color:white;
}

/* SIDEBAR */
.sidebar {
  width:220px;
  background:#020617;
  height:100vh;
  padding:20px;
}

.sidebar h2 {
  text-align:center;
}

.sidebar button {
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  background:#1e293b;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

/* MAIN */
.main {
  flex:1;
  padding:20px;
}

/* CARDS */
.cards {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
}

.card {
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  text-align:center;
}

/* TABLE */
table {
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
}

th, td {
  padding:12px;
  border-bottom:1px solid #334155;
}

/* TOP BAR */
.top {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logout {
  background:red;
  padding:10px;
  border:none;
  color:white;
  border-radius:8px;
}

</style>
</head>

<body>

<div class="sidebar">
  <h2>Admin</h2>
  <button onclick="loadUsers()">Users</button>
  <button onclick="loadSOS()">SOS</button>
  <button onclick="loadTrack()">Tracking</button>
  <button onclick="loadCategory()">Category</button>
</div>

<div class="main">

  <div class="top">
    <h1>Dashboard</h1>
    <button class="logout" onclick="logout()">Logout</button>
  </div>

  <!-- STATS -->
  <div class="cards">
    <div class="card">
      <h3 id="userCount">0</h3>
      <p>Users</p>
    </div>
    <div class="card">
      <h3 id="sosCount">0</h3>
      <p>SOS Alerts</p>
    </div>
    <div class="card">
      <h3 id="trackCount">0</h3>
      <p>Tracking Logs</p>
    </div>
    <div class="card">
      <h3 id="catCount">0</h3>
      <p>Categories</p>
    </div>
  </div>

  <!-- DATA -->
  <table id="table">
    <thead>
      <tr><th>Data</th></tr>
    </thead>
    <tbody></tbody>
  </table>

</div>

<script>

/* LOAD USERS */
function loadUsers(){
  fetch("/admin/users")
  .then(res=>res.json())
  .then(data=>{
    document.getElementById("userCount").innerText=data.length;
    render(data);
  });
}

/* LOAD SOS */
function loadSOS(){
  fetch("/admin/sos")
  .then(res=>res.json())
  .then(data=>{
    document.getElementById("sosCount").innerText=data.length;
    render(data);
  });
}

/* LOAD TRACK */
function loadTrack(){
  fetch("/admin/track")
  .then(res=>res.json())
  .then(data=>{
    document.getElementById("trackCount").innerText=data.length;
    render(data);
  });
}

/* LOAD CATEGORY */
function loadCategory(){
  fetch("/admin/category")
  .then(res=>res.json())
  .then(data=>{
    document.getElementById("catCount").innerText=data.length;
    render(data);
  });
}

/* RENDER TABLE */
function render(data){
  const tbody=document.querySelector("#table tbody");
  tbody.innerHTML="";

  data.forEach(item=>{
    let row=document.createElement("tr");
    row.innerHTML=`<td>${JSON.stringify(item)}</td>`;
    tbody.appendChild(row);
  });
}

/* LOGOUT */
function logout(){
  window.location="/logout";
}

/* AUTO LOAD */
loadUsers();

</script>

</body>
</html>
