<!DOCTYPE html>
<html>
<head>
<title>RapidRelief // Control Core</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

/* ===== GLOBAL ===== */
body{
  margin:0;
  font-family: "Courier New", monospace;
  background:#020617;
  color:#00ff9f;
  display:flex;
}

/* subtle scanlines */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:repeating-linear-gradient(
    0deg,
    rgba(0,255,159,0.03),
    rgba(0,255,159,0.03) 1px,
    transparent 1px,
    transparent 3px
  );
  pointer-events:none;
}

/* ===== SIDEBAR ===== */
.sidebar{
  width:230px;
  padding:20px;
  border-right:1px solid #00ff9f;
}

.sidebar h2{
  text-align:center;
  text-shadow:0 0 10px #00ff9f;
}

.sidebar button{
  width:100%;
  padding:10px;
  margin:10px 0;
  background:transparent;
  border:1px solid #00ff9f;
  color:#00ff9f;
  cursor:pointer;
}

.sidebar button:hover{
  background:#00ff9f;
  color:black;
}

/* ===== MAIN ===== */
.main{
  flex:1;
  padding:20px;
}

/* TOPBAR */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.live{
  color:#00ff9f;
  animation:blink 1s infinite;
}

@keyframes blink{
  50%{opacity:0;}
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-top:20px;
}

.card{
  border:1px solid #00ff9f;
  padding:15px;
  text-align:center;
}

/* MAP */
#map{
  height:300px;
  margin-top:20px;
  border:1px solid #00ff9f;
}

/* TABLE */
table{
  width:100%;
  margin-top:20px;
}

td,th{
  border-bottom:1px solid #00ff9f;
  padding:8px;
}

/* ALERT */
.alert{
  color:red;
  animation:blink 0.5s infinite;
}

/* TERMINAL */
.terminal{
  margin-top:15px;
  border:1px solid #00ff9f;
  padding:10px;
  height:120px;
  overflow:auto;
  font-size:12px;
}

/* BUTTON */
.nav-btn{
  background:#00ff9f;
  border:none;
  padding:5px;
  cursor:pointer;
}

.logout{
  background:red;
  border:none;
  padding:10px;
  color:white;
}

</style>
</head>

<body>

<div class="sidebar">
  <h2>⚡ CORE</h2>
  <button onclick="loadMode('users')">Users</button>
  <button onclick="loadMode('sos')">SOS</button>
  <button onclick="loadMode('track')">Tracking</button>
  <button onclick="loadMode('category')">Category</button>
</div>

<div class="main">

  <div class="topbar">
    <h1>🧠 CONTROL CORE</h1>
    <div class="live">● LIVE</div>
    <button class="logout" onclick="logout()">EXIT</button>
  </div>

  <!-- STATS -->
  <div class="cards">
    <div class="card"><h2 id="u">0</h2><p>USERS</p></div>
    <div class="card"><h2 id="s">0</h2><p style="color:red;">SOS</p></div>
    <div class="card"><h2 id="t">0</h2><p>TRACK</p></div>
    <div class="card"><h2 id="c">0</h2><p>CATEGORY</p></div>
  </div>

  <!-- MAP -->
  <div id="map"></div>

  <!-- TABLE -->
  <table>
    <thead>
      <tr>
        <th>USER</th>
        <th>LAT</th>
        <th>LON</th>
        <th>TIME</th>
        <th>GO</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <!-- TERMINAL -->
  <div class="terminal" id="terminal"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

/* MAP */
let map = L.map('map').setView([10,76],7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let markers = {};
let currentMode = "all";

/* TERMINAL */
function log(msg){
  let t = document.getElementById("terminal");
  t.innerHTML += msg + "<br>";
  t.scrollTop = t.scrollHeight;
}

/* UPDATE MARKERS */
function updateMarker(user, lat, lon){
  if(markers[user]){
    markers[user].setLatLng([lat,lon]);
  } else {
    markers[user] = L.marker([lat,lon]).addTo(map)
      .bindPopup(user);
  }
}

/* TABLE */
function addRow(d){
  const tbody = document.querySelector("tbody");

  let row = document.createElement("tr");

  row.innerHTML = `
    <td>${d.user}</td>
    <td>${d.lat}</td>
    <td>${d.lon}</td>
    <td>${d.time}</td>
    <td><button class="nav-btn" onclick="openMap(${d.lat},${d.lon})">GO</button></td>
  `;

  tbody.prepend(row);
}

/* MAP NAV */
function openMap(lat,lon){
  window.open(`https://maps.google.com?q=${lat},${lon}`);
}

/* LIVE CONNECTION */
const live = new EventSource("/live");

live.onmessage = (e)=>{
  const msg = JSON.parse(e.data);

  if(msg.type==="track"){
    updateMarker(msg.data.user,msg.data.lat,msg.data.lon);
    addRow(msg.data);
    log("TRACK UPDATE: " + msg.data.user);
  }

  if(msg.type==="sos"){
    updateMarker(msg.data.user,msg.data.lat,msg.data.lon);
    addRow(msg.data);
    log("🚨 SOS ALERT: " + msg.data.user);

    document.body.style.boxShadow="inset 0 0 80px red";
    setTimeout(()=>{document.body.style.boxShadow="none";},800);
  }
};

/* LOAD COUNTS */
function refreshStats(){
  Promise.all([
    fetch("/admin/users").then(r=>r.json()),
    fetch("/admin/sos").then(r=>r.json()),
    fetch("/admin/track").then(r=>r.json()),
    fetch("/admin/category").then(r=>r.json())
  ])
  .then(([u,s,t,c])=>{
    document.getElementById("u").innerText=u.length;
    document.getElementById("s").innerText=s.length;
    document.getElementById("t").innerText=t.length;
    document.getElementById("c").innerText=c.length;
  });
}

setInterval(refreshStats,3000);
refreshStats();

function loadMode(mode){
  log("MODE SWITCH: " + mode.toUpperCase());
}

function logout(){
  window.location="/logout";
}

</script>

</body>
</html>
