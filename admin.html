<!DOCTYPE html>
<html>
<head>
<title>RapidRelief Admin</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
  margin:0;
  font-family:Segoe UI;
  display:flex;
  background:#0f172a;
  color:white;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  background:#020617;
  height:100vh;
  padding:20px;
}

.sidebar h2{
  text-align:center;
}

.sidebar button{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  background:#1e293b;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

/* MAIN */
.main{
  flex:1;
  padding:20px;
}

/* TOP */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logout{
  background:red;
  border:none;
  padding:10px;
  border-radius:8px;
  color:white;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
  margin-top:20px;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  text-align:center;
}

/* CHART */
.chart-box{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  margin-top:20px;
}

/* TABLE */
table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
}

th,td{
  padding:12px;
  border-bottom:1px solid #334155;
}

/* MOBILE */
@media(max-width:768px){
  .cards{
    grid-template-columns:1fr 1fr;
  }
  .sidebar{
    display:none;
  }
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>Admin</h2>
  <button onclick="loadUsers()">Users</button>
  <button onclick="loadSOS()">SOS</button>
  <button onclick="loadTrack()">Tracking</button>
  <button onclick="loadCategory()">Category</button>
</div>

<!-- MAIN -->
<div class="main">

  <div class="top">
    <h1>Dashboard</h1>
    <button class="logout" onclick="logout()">Logout</button>
  </div>

  <!-- STATS -->
  <div class="cards">
    <div class="card"><h3 id="u">0</h3><p>Users</p></div>
    <div class="card"><h3 id="s">0</h3><p>SOS</p></div>
    <div class="card"><h3 id="t">0</h3><p>Tracking</p></div>
    <div class="card"><h3 id="c">0</h3><p>Category</p></div>
  </div>

  <!-- CHART -->
  <div class="chart-box">
    <canvas id="chart"></canvas>
  </div>

  <!-- TABLE -->
  <table id="table">
    <thead><tr><th>Data</th></tr></thead>
    <tbody></tbody>
  </table>

</div>

<script>

let chart;

/* UPDATE CHART */
function updateChart(u,s,t,c){

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type:"bar",
    data:{
      labels:["Users","SOS","Tracking","Category"],
      datasets:[{
        label:"System Data",
        data:[u,s,t,c],
      }]
    }
  });
}

/* RENDER */
function render(data){
  const tbody=document.querySelector("#table tbody");
  tbody.innerHTML="";

  data.forEach(d=>{
    let row=document.createElement("tr");
    row.innerHTML=`<td>${JSON.stringify(d)}</td>`;
    tbody.appendChild(row);
  });
}

/* LOAD USERS */
function loadUsers(){
  fetch("/admin/users").then(r=>r.json()).then(d=>{
    document.getElementById("u").innerText=d.length;
    render(d);
    updateChart(d.length,0,0,0);
  });
}

/* LOAD SOS */
function loadSOS(){
  fetch("/admin/sos").then(r=>r.json()).then(d=>{
    document.getElementById("s").innerText=d.length;
    render(d);
    updateChart(0,d.length,0,0);
  });
}

/* LOAD TRACK */
function loadTrack(){
  fetch("/admin/track").then(r=>r.json()).then(d=>{
    document.getElementById("t").innerText=d.length;
    render(d);
    updateChart(0,0,d.length,0);
  });
}

/* LOAD CATEGORY */
function loadCategory(){
  fetch("/admin/category").then(r=>r.json()).then(d=>{
    document.getElementById("c").innerText=d.length;
    render(d);
    updateChart(0,0,0,d.length);
  });
}

/* LOGOUT */
function logout(){
  window.location="/logout";
}

/* INITIAL LOAD */
Promise.all([
  fetch("/admin/users").then(r=>r.json()),
  fetch("/admin/sos").then(r=>r.json()),
  fetch("/admin/track").then(r=>r.json()),
  fetch("/admin/category").then(r=>r.json())
]).then(([u,s,t,c])=>{
  document.getElementById("u").innerText=u.length;
  document.getElementById("s").innerText=s.length;
  document.getElementById("t").innerText=t.length;
  document.getElementById("c").innerText=c.length;

  updateChart(u.length,s.length,t.length,c.length);
});

</script>

</body>
</html>
