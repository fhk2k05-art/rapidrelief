<!DOCTYPE html>
<html>
<head>
<title>RapidRelief Admin</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
  margin:0;
  font-family:Segoe UI;
  display:flex;
  background:#020617;
  color:white;
}

/* SIDEBAR */
.sidebar{
  width:230px;
  background:#020617;
  padding:20px;
}

.sidebar h2{
  text-align:center;
  color:#38bdf8;
}

.sidebar button{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:10px;
  background:#1e293b;
  color:white;
  cursor:pointer;
}

/* MAIN */
.main{
  flex:1;
  padding:20px;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  text-align:center;
}

/* TABLE */
table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
}

th,td{
  padding:12px;
  border-bottom:1px solid #334155;
  text-align:center;
}

/* BUTTON */
.nav-btn{
  padding:6px 10px;
  background:#22c55e;
  border:none;
  border-radius:6px;
  color:white;
  cursor:pointer;
}

.logout{
  background:red;
  padding:10px;
  border:none;
  color:white;
  border-radius:8px;
}

</style>
</head>

<body>

<div class="sidebar">
  <h2>⚡ Admin</h2>
  <button onclick="loadUsers()">Users</button>
  <button onclick="loadSOS()">SOS</button>
  <button onclick="loadTrack()">Tracking</button>
  <button onclick="loadCategory()">Category</button>
</div>

<div class="main">

  <div style="display:flex;justify-content:space-between;">
    <h1>🚀 Control Panel</h1>
    <button class="logout" onclick="logout()">Logout</button>
  </div>

  <div class="cards">
    <div class="card"><h3 id="u">0</h3><p>Users</p></div>
    <div class="card"><h3 id="s">0</h3><p>SOS</p></div>
    <div class="card"><h3 id="t">0</h3><p>Tracking</p></div>
    <div class="card"><h3 id="c">0</h3><p>Category</p></div>
  </div>

  <!-- TABLE -->
  <table id="table">
    <thead>
      <tr>
        <th>User</th>
        <th>Latitude</th>
        <th>Longitude</th>
        <th>Time</th>
        <th>Navigate</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

</div>

<script>

/* NAVIGATION */
function openMap(lat,lon){
  window.open(`https://www.google.com/maps?q=${lat},${lon}`);
}

/* RENDER TABLE */
function render(data){

  const tbody=document.querySelector("#table tbody");
  tbody.innerHTML="";

  data.forEach(d=>{

    let lat = d.lat || "-";
    let lon = d.lon || "-";
    let user = d.user || d.username || "Unknown";
    let time = d.time || "-";

    let row=document.createElement("tr");

    row.innerHTML=`
      <td>${user}</td>
      <td>${lat}</td>
      <td>${lon}</td>
      <td>${time}</td>
      <td>
        ${lat !== "-" ? `<button class="nav-btn" onclick="openMap(${lat},${lon})">📍 Go</button>` : "-"}
      </td>
    `;

    tbody.appendChild(row);
  });
}

/* LOAD USERS */
function loadUsers(){
  fetch("/admin/users").then(r=>r.json()).then(d=>{
    document.getElementById("u").innerText=d.length;
    render(d);
  });
}

/* LOAD SOS */
function loadSOS(){
  fetch("/admin/sos").then(r=>r.json()).then(d=>{
    document.getElementById("s").innerText=d.length;
    render(d);
  });
}

/* LOAD TRACK */
function loadTrack(){
  fetch("/admin/track").then(r=>r.json()).then(d=>{
    document.getElementById("t").innerText=d.length;
    render(d);
  });
}

/* LOAD CATEGORY */
function loadCategory(){
  fetch("/admin/category").then(r=>r.json()).then(d=>{
    document.getElementById("c").innerText=d.length;
    render(d);
  });
}

/* LOGOUT */
function logout(){
  window.location="/logout";
}

/* INITIAL LOAD */
loadUsers();

</script>

</body>
</html>
