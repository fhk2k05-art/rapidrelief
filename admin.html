<!DOCTYPE html>
<html>
<head>
<title>RapidRelief Control</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

/* ===== GLOBAL ===== */
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:#020617;
  color:white;
  display:flex;
  overflow:hidden;
}

/* SUBTLE SCANLINE */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:repeating-linear-gradient(
    0deg,
    rgba(255,255,255,0.02),
    rgba(255,255,255,0.02) 1px,
    transparent 1px,
    transparent 3px
  );
  pointer-events:none;
}

/* ===== SIDEBAR ===== */
.sidebar{
  width:240px;
  padding:20px;
  background:rgba(255,255,255,0.03);
  backdrop-filter:blur(20px);
  border-right:1px solid rgba(255,255,255,0.05);
}

.sidebar h2{
  text-align:center;
  color:#38bdf8;
}

.sidebar button{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:12px;
  background:rgba(255,255,255,0.05);
  color:white;
  cursor:pointer;
  transition:0.3s;
}

.sidebar button:hover{
  background:#2563eb;
}

/* ===== MAIN ===== */
.main{
  flex:1;
  padding:20px;
}

/* TOPBAR */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.live{
  color:#22c55e;
  font-weight:bold;
  position:relative;
}

.live::after{
  content:"";
  width:6px;
  height:6px;
  background:#22c55e;
  border-radius:50%;
  position:absolute;
  right:-12px;
  top:6px;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{opacity:1;}
  50%{opacity:0;}
  100%{opacity:1;}
}

/* ===== CARDS ===== */
.cards{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
  margin-top:20px;
}

.card{
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:18px;
  backdrop-filter:blur(15px);
  box-shadow:0 8px 25px rgba(0,0,0,0.5);
  text-align:center;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-3px);
  box-shadow:0 0 20px rgba(56,189,248,0.3);
}

/* ===== MAP ===== */
#adminMap{
  height:300px;
  margin-top:20px;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 0 25px rgba(0,0,0,0.6);
}

/* ===== TABLE ===== */
table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
  background:rgba(255,255,255,0.03);
  border-radius:12px;
  overflow:hidden;
}

th,td{
  padding:12px;
  border-bottom:1px solid rgba(255,255,255,0.05);
  text-align:center;
}

/* ALERT */
.alert{
  background:rgba(255,0,0,0.15);
  box-shadow:inset 0 0 10px rgba(255,0,0,0.5);
}

/* BUTTON */
.nav-btn{
  padding:6px 10px;
  background:#22c55e;
  border:none;
  border-radius:6px;
  color:white;
  cursor:pointer;
}

/* LOGOUT */
.logout{
  background:#ef4444;
  padding:10px;
  border:none;
  color:white;
  border-radius:8px;
}

</style>
</head>

<body>

<div class="sidebar">
  <h2>RapidRelief</h2>
  <button onclick="loadUsers()">Users</button>
  <button onclick="loadSOS()">SOS</button>
  <button onclick="loadTrack()">Tracking</button>
  <button onclick="loadCategory()">Category</button>
</div>

<div class="main">

  <div class="topbar">
    <h1>Control Center</h1>
    <div class="live">LIVE</div>
    <button class="logout" onclick="logout()">Logout</button>
  </div>

  <div class="cards">
    <div class="card"><h2 id="u">0</h2><p>Users</p></div>
    <div class="card"><h2 id="s">0</h2><p style="color:#ef4444;">SOS</p></div>
    <div class="card"><h2 id="t">0</h2><p>Tracking</p></div>
    <div class="card"><h2 id="c">0</h2><p>Category</p></div>
  </div>

  <div id="adminMap"></div>

  <table>
    <thead>
      <tr>
        <th>User</th>
        <th>Lat</th>
        <th>Lon</th>
        <th>Time</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

let map = L.map('adminMap').setView([10,76],7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

function render(data){
  const tbody=document.querySelector("tbody");
  tbody.innerHTML="";

  data.slice().reverse().forEach((d,i)=>{
    let row=document.createElement("tr");

    if(i===0) row.classList.add("alert");

    row.innerHTML=`
      <td>${d.user||"Unknown"}</td>
      <td>${d.lat||"-"}</td>
      <td>${d.lon||"-"}</td>
      <td>${d.time||"-"}</td>
      <td>${d.lat?`<button class="nav-btn" onclick="openMap(${d.lat},${d.lon})">Go</button>`:"-"}</td>
    `;

    tbody.appendChild(row);
  });
}

function plot(data){
  data.forEach(d=>{
    if(d.lat) L.marker([d.lat,d.lon]).addTo(map);
  });
}

function openMap(lat,lon){
  window.open(`https://maps.google.com?q=${lat},${lon}`);
}

function refreshAll(){

  Promise.all([
    fetch("/admin/users").then(r=>r.json()),
    fetch("/admin/sos").then(r=>r.json()),
    fetch("/admin/track").then(r=>r.json()),
    fetch("/admin/category").then(r=>r.json())
  ])
  .then(([u,s,t,c])=>{

    document.getElementById("u").innerText=u.length;
    document.getElementById("s").innerText=s.length;
    document.getElementById("t").innerText=t.length;
    document.getElementById("c").innerText=c.length;

    render([...s,...t]);
    plot([...s,...t]);
  });
}

setInterval(refreshAll,4000);
refreshAll();

function loadUsers(){ fetch("/admin/users").then(r=>r.json()).then(render); }
function loadSOS(){ fetch("/admin/sos").then(r=>r.json()).then(render); }
function loadTrack(){ fetch("/admin/track").then(r=>r.json()).then(render); }
function loadCategory(){ fetch("/admin/category").then(r=>r.json()).then(render); }

function logout(){
  window.location="/logout";
}

</script>

</body>
</html>
