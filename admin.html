<!DOCTYPE html>
<html>
<head>
<title>RapidRelief Control System</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
  margin:0;
  font-family:Segoe UI;
  display:flex;
  background:#020617;
  color:white;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  background:#020617;
  padding:20px;
  border-right:1px solid #1e293b;
}

.sidebar h2{
  text-align:center;
  color:#38bdf8;
}

.sidebar button{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:10px;
  background:#1e293b;
  color:white;
  cursor:pointer;
  transition:0.3s;
}

.sidebar button:hover{
  background:#38bdf8;
}

/* MAIN */
.main{
  flex:1;
  padding:20px;
}

/* TOP BAR */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.live{
  color:#22c55e;
  font-weight:bold;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
  margin-top:20px;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  text-align:center;
  box-shadow:0 0 10px rgba(56,189,248,0.2);
}

/* MAP */
#adminMap{
  height:300px;
  margin-top:20px;
  border-radius:12px;
}

/* CHART */
.chart-box{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  margin-top:20px;
}

/* TABLE */
table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
}

th,td{
  padding:12px;
  border-bottom:1px solid #334155;
  text-align:center;
}

/* ALERT */
.alert{
  background:#7f1d1d;
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%{box-shadow:0 0 5px red;}
  50%{box-shadow:0 0 20px red;}
  100%{box-shadow:0 0 5px red;}
}

/* BUTTON */
.nav-btn{
  padding:6px 10px;
  background:#22c55e;
  border:none;
  border-radius:6px;
  color:white;
  cursor:pointer;
}

.logout{
  background:red;
  padding:10px;
  border:none;
  color:white;
  border-radius:8px;
}

</style>
</head>

<body>

<div class="sidebar">
  <h2>🚨 Control</h2>
  <button onclick="loadUsers()">Users</button>
  <button onclick="loadSOS()">SOS</button>
  <button onclick="loadTrack()">Tracking</button>
  <button onclick="loadCategory()">Category</button>
</div>

<div class="main">

  <div class="topbar">
    <h1>🧠 Control Panel</h1>
    <div class="live">● LIVE</div>
    <button class="logout" onclick="logout()">Logout</button>
  </div>

  <!-- CARDS -->
  <div class="cards">
    <div class="card"><h3 id="u">0</h3><p>Users</p></div>
    <div class="card"><h3 id="s">0</h3><p style="color:red;">SOS</p></div>
    <div class="card"><h3 id="t">0</h3><p>Tracking</p></div>
    <div class="card"><h3 id="c">0</h3><p>Category</p></div>
  </div>

  <!-- MAP -->
  <div id="adminMap"></div>

  <!-- CHART -->
  <div class="chart-box">
    <canvas id="chart"></canvas>
  </div>

  <!-- TABLE -->
  <table id="table">
    <thead>
      <tr>
        <th>User</th>
        <th>Lat</th>
        <th>Lon</th>
        <th>Time</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

let chart;
let lastSOS = 0;

/* MAP */
let adminMap = L.map('adminMap').setView([10,76],7);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(adminMap);

/* MAP NAV */
function openMap(lat,lon){
  window.open(`https://www.google.com/maps?q=${lat},${lon}`);
}

/* CHART */
function updateChart(u,s,t,c){
  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type:"doughnut",
    data:{
      labels:["Users","SOS","Tracking","Category"],
      datasets:[{
        data:[u,s,t,c],
        backgroundColor:["#38bdf8","#ef4444","#22c55e","#f59e0b"]
      }]
    },
    options:{
      plugins:{legend:{labels:{color:"white"}}}
    }
  });
}

/* TABLE */
function render(data){

  const tbody=document.querySelector("#table tbody");
  tbody.innerHTML="";

  data.slice().reverse().forEach((d,i)=>{

    let row=document.createElement("tr");

    if(i===0) row.classList.add("alert");

    row.innerHTML=`
      <td>${d.user||"Unknown"}</td>
      <td>${d.lat||"-"}</td>
      <td>${d.lon||"-"}</td>
      <td>${d.time||"-"}</td>
      <td>${d.lat?`<button class="nav-btn" onclick="openMap(${d.lat},${d.lon})">📍</button>`:"-"}</td>
    `;

    tbody.appendChild(row);
  });
}

/* MAP PLOT */
function plotMap(data){
  adminMap.eachLayer(layer=>{
    if(layer instanceof L.Marker) adminMap.removeLayer(layer);
  });

  data.forEach(d=>{
    if(d.lat && d.lon){
      L.marker([d.lat,d.lon]).addTo(adminMap);
    }
  });
}

/* LIVE REFRESH */
function refreshAll(){

  Promise.all([
    fetch("/admin/users").then(r=>r.json()),
    fetch("/admin/sos").then(r=>r.json()),
    fetch("/admin/track").then(r=>r.json()),
    fetch("/admin/category").then(r=>r.json())
  ])
  .then(([u,s,t,c])=>{

    document.getElementById("u").innerText=u.length;
    document.getElementById("s").innerText=s.length;
    document.getElementById("t").innerText=t.length;
    document.getElementById("c").innerText=c.length;

    updateChart(u.length,s.length,t.length,c.length);

    render([...s,...t]);
    plotMap([...s,...t]);

    /* 🚨 ALERT SOUND */
    if(s.length > lastSOS){
      new Audio("https://www.soundjay.com/button/beep-07.wav").play();
    }
    lastSOS = s.length;

  });
}

function loadUsers(){ fetch("/admin/users").then(r=>r.json()).then(render); }
function loadSOS(){ fetch("/admin/sos").then(r=>r.json()).then(render); }
function loadTrack(){ fetch("/admin/track").then(r=>r.json()).then(render); }
function loadCategory(){ fetch("/admin/category").then(r=>r.json()).then(render); }

setInterval(refreshAll,5000);
refreshAll();

function logout(){
  window.location="/logout";
}

</script>

</body>
</html>
