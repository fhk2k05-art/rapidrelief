<!DOCTYPE html>
<html>
<head>
<title>RapidRelief Admin PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

/* 🌌 BACKGROUND */
body {
  margin:0;
  font-family:'Segoe UI', sans-serif;
  display:flex;
  background:linear-gradient(135deg,#0f172a,#020617);
  color:white;
}

/* 🔥 SIDEBAR */
.sidebar {
  width:230px;
  padding:20px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  border-right:1px solid rgba(255,255,255,0.1);
}

.sidebar button {
  width:100%;
  margin:10px 0;
  padding:12px;
  background:rgba(255,255,255,0.05);
  border:none;
  border-radius:10px;
  color:white;
  cursor:pointer;
  transition:0.3s;
}

.sidebar button:hover {
  background:linear-gradient(135deg,#00c6ff,#0072ff);
  transform:scale(1.05);
}

/* 🧠 MAIN */
.main {
  flex:1;
  padding:25px;
}

.main h2 {
  font-weight:600;
  letter-spacing:1px;
  text-shadow: 0 0 10px rgba(0,198,255,0.6);
}

/* 📦 CONTENT */
.content {
  display:flex;
  gap:20px;
}

/* 📜 LIST */
.list {
  width:40%;
  height:520px;
  overflow:auto;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  border-radius:15px;
  padding:10px;
}

/* 🗺️ MAP */
#map {
  width:60%;
  height:520px;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

/* 🧾 CARD */
.card {
  margin:10px;
  padding:15px;
  background:rgba(255,255,255,0.08);
  border-radius:12px;
  backdrop-filter:blur(10px);
  transition:0.3s;
}

.card:hover {
  transform:translateY(-5px);
  box-shadow:0 10px 20px rgba(0,0,0,0.5);
}

/* 🚦 STATUS */
.status {
  margin-top:8px;
  padding:5px 10px;
  border-radius:8px;
  font-size:12px;
}

.pending {
  background:rgba(255,165,0,0.2);
  color:orange;
}

.dispatched {
  background:rgba(0,150,255,0.2);
  color:#00c6ff;
}

.resolved {
  background:rgba(0,255,150,0.2);
  color:#22c55e;
}

/* 🔘 BUTTONS */
.card button {
  margin:5px;
  padding:8px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:linear-gradient(135deg,#00c6ff,#0072ff);
  color:white;
  transition:0.3s;
}

.card button:hover {
  transform:scale(1.05);
  box-shadow:0 5px 15px rgba(0,198,255,0.4);
}

</style>
</head>

<body>

<div class="sidebar">
  <button onclick="loadSOS()">🚨 SOS</button>
  <button onclick="loadTrack()">📍 Live Tracking</button>
  <button onclick="loadUsers()">👤 Users</button>
</div>

<div class="main">
  <h2>🚑 Admin Dashboard PRO</h2>

  <div class="content">
    <div class="list" id="list"></div>
    <div id="map"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

let map = L.map('map').setView([10.8505,76.2711], 7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let markers=[];

/* 🚨 SOS */
function loadSOS(){
  fetch("/admin/sos")
  .then(res=>res.json())
  .then(data=>{

    markers.forEach(m=>map.removeLayer(m));
    markers=[];

    let html="";

    data.slice().reverse().forEach((s,index)=>{

      const status = s.status || "pending";

      html+=`
      <div class="card">
        🚨 <b>${s.type}</b><br>
        📍 ${s.lat}, ${s.lon}<br>

        <span class="status ${status}">
          ${status.toUpperCase()}
        </span><br><br>

        <button onclick="dispatch(${index})">🚑 Dispatch</button>
        <button onclick="resolve(${index})">✅ Resolve</button>
      </div>`;

      let marker = L.marker([s.lat,s.lon]).addTo(map)
        .bindPopup(`${s.type} - ${status}`);
      markers.push(marker);
    });

    document.getElementById("list").innerHTML = html;
  });
}

/* 🚑 DISPATCH */
function dispatch(index){
  fetch("/admin/update-status",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      index,
      status:"dispatched"
    })
  })
  .then(()=>loadSOS());
}

/* ✅ RESOLVE */
function resolve(index){
  fetch("/admin/update-status",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      index,
      status:"resolved"
    })
  })
  .then(()=>loadSOS());
}

/* 📍 TRACK */
function loadTrack(){

  fetch("/admin/track")
  .then(res=>res.json())
  .then(data=>{

    markers.forEach(m=>map.removeLayer(m));
    markers=[];

    let html="";

    data.slice(-20).forEach(t=>{
      html+=`<div class="card">📍 ${t.lat}, ${t.lon}</div>`;
      let marker = L.marker([t.lat,t.lon]).addTo(map);
      markers.push(marker);
    });

    document.getElementById("list").innerHTML = html;

    let last=data[data.length-1];
    if(last) map.setView([last.lat,last.lon],15);
  });
}

/* 👤 USERS */
function loadUsers(){
  fetch("/admin/users")
  .then(res=>res.json())
  .then(data=>{
    let html="";
    data.forEach(u=>{
      html+=`<div class="card">👤 ${u.username}</div>`;
    });
    document.getElementById("list").innerHTML=html;
  });
}

/* 🔄 AUTO REFRESH */
setInterval(loadSOS,5000);

</script>

</body>
</html>
