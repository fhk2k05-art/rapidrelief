<!DOCTYPE html>
<html>
<head>
<title>RapidRelief Admin PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body {
  margin:0;
  font-family:'Segoe UI';
  display:flex;
  background:#0f172a;
  color:white;
}

.sidebar {
  width:220px;
  background:#020617;
  padding:20px;
}

.sidebar button {
  width:100%;
  margin:10px 0;
  padding:10px;
  background:#1e293b;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.main {
  flex:1;
  padding:20px;
}

.content {
  display:flex;
}

.list {
  width:40%;
  height:500px;
  overflow:auto;
}

#map {
  width:60%;
  height:500px;
  border-radius:10px;
}

.card {
  margin:10px;
  padding:10px;
  background:#1e293b;
  border-radius:10px;
}

.status {
  margin-top:5px;
  padding:5px;
  border-radius:5px;
  display:inline-block;
}

.pending { background:orange; }
.dispatched { background:blue; }
.resolved { background:green; }
</style>
</head>

<body>

<div class="sidebar">
  <button onclick="loadSOS()">🚨 SOS</button>
  <button onclick="loadTrack()">📍 Live Tracking</button>
  <button onclick="loadUsers()">👤 Users</button>
</div>

<div class="main">
  <h2>🚑 Admin Dashboard PRO</h2>

  <div class="content">
    <div class="list" id="list"></div>
    <div id="map"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
let map = L.map('map').setView([10.8505,76.2711], 7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let markers=[];

/* =========================
   SOS WITH STATUS + DISPATCH
========================= */
function loadSOS(){
  fetch("/admin/sos")
  .then(res=>res.json())
  .then(data=>{

    markers.forEach(m=>map.removeLayer(m));
    markers=[];

    let html="";

    data.slice().reverse().forEach((s,index)=>{

      const status = s.status || "pending";

      html+=`
      <div class="card">
        🚨 <b>${s.type}</b><br>
        📍 ${s.lat}, ${s.lon}<br>

        <span class="status ${status}">
          ${status.toUpperCase()}
        </span><br><br>

        <button onclick="dispatch(${index})">🚑 Dispatch</button>
        <button onclick="resolve(${index})">✅ Resolve</button>
      </div>`;

      let marker = L.marker([s.lat,s.lon]).addTo(map)
        .bindPopup(`${s.type} - ${status}`);
      markers.push(marker);
    });

    document.getElementById("list").innerHTML = html;
  });
}

/* =========================
   DISPATCH
========================= */
function dispatch(index){
  fetch("/admin/update-status",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      index,
      status:"dispatched"
    })
  })
  .then(()=>loadSOS());
}

/* =========================
   RESOLVE
========================= */
function resolve(index){
  fetch("/admin/update-status",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      index,
      status:"resolved"
    })
  })
  .then(()=>loadSOS());
}

/* =========================
   TRACK
========================= */
function loadTrack(){

  fetch("/admin/track")
  .then(res=>res.json())
  .then(data=>{

    markers.forEach(m=>map.removeLayer(m));
    markers=[];

    let html="";

    data.slice(-20).forEach(t=>{

      html+=`<div class="card">📍 ${t.lat}, ${t.lon}</div>`;

      let marker = L.marker([t.lat,t.lon]).addTo(map);
      markers.push(marker);
    });

    document.getElementById("list").innerHTML = html;

    let last=data[data.length-1];
    if(last) map.setView([last.lat,last.lon],15);
  });
}

/* =========================
   USERS
========================= */
function loadUsers(){
  fetch("/admin/users")
  .then(res=>res.json())
  .then(data=>{
    let html="";
    data.forEach(u=>{
      html+=`<div class="card">👤 ${u.username}</div>`;
    });
    document.getElementById("list").innerHTML=html;
  });
}

/* =========================
   AUTO REFRESH SOS
========================= */
setInterval(loadSOS,5000);

</script>

</body>
</html>
